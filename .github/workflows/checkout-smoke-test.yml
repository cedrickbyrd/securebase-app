name: Checkout Smoke Test

# Catches "proxy points at wrong Lambda" and "Lambda not deployed" failures
# before they reach a real user.  Uses Stripe test-mode keys so no real
# charges are ever created.
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-test:
    name: POST /api/checkout → expect 200 + sessionId
    runs-on: ubuntu-latest

    steps:
      # Required secrets:
      #   STRIPE_TEST_PRICE_ID — a Stripe test-mode price ID for the pilot_compliance tier.
      #     Create it in Stripe Dashboard → Products (test mode) → pilot_compliance product
      #     → Add price (one-time, $4.95 test) and copy the price_1... ID here.
      #     Store it under Settings → Secrets and variables → Actions → Repository secrets.
      # Optional variables (can be overridden via GitHub Actions variables):
      #   PRODUCTION_BASE_URL — defaults to https://securebase.tximhotep.com
      - name: POST to /api/checkout (Stripe test mode)
        id: checkout_call
        env:
          # Stripe test-mode Price ID for pilot_compliance stored as a repo secret.
          # In test mode this never creates a real charge.
          SMOKE_PRICE_ID: ${{ secrets.STRIPE_TEST_PRICE_ID }}
          SMOKE_BASE_URL: ${{ vars.PRODUCTION_BASE_URL || 'https://securebase.tximhotep.com' }}
        run: |
          HTTP_RESPONSE=$(curl -s -o /tmp/smoke_body.json -w "%{http_code}" \
            -X POST "${SMOKE_BASE_URL}/api/checkout" \
            -H "Content-Type: application/json" \
            -d "{
              \"email\": \"smoke-test@ci.securebase.tximhotep.com\",
              \"name\": \"CI Smoke Test\",
              \"tier\": \"pilot_compliance\",
              \"priceId\": \"${SMOKE_PRICE_ID}\",
              \"billingType\": \"payment\",
              \"successUrl\": \"${SMOKE_BASE_URL}/thank-you?session_id={CHECKOUT_SESSION_ID}\",
              \"cancelUrl\": \"${SMOKE_BASE_URL}/pricing\"
            }")

          echo "http_status=${HTTP_RESPONSE}" >> "$GITHUB_OUTPUT"
          echo "--- Response body ---"
          cat /tmp/smoke_body.json

      - name: Validate response
        env:
          HTTP_STATUS: ${{ steps.checkout_call.outputs.http_status }}
        run: |
          if [ "${HTTP_STATUS}" != "200" ]; then
            echo "::error::Checkout smoke test failed — expected HTTP 200, got ${HTTP_STATUS}"
            echo "Response body:"
            cat /tmp/smoke_body.json
            exit 1
          fi

          # Confirm the Lambda returned either sessionId or checkout_url
          if ! jq -e '(.sessionId // .checkout_url) | length > 0' /tmp/smoke_body.json > /dev/null 2>&1; then
            echo "::error::Checkout smoke test failed — HTTP 200 but response is missing sessionId/checkout_url"
            echo "Response body:"
            cat /tmp/smoke_body.json
            exit 1
          fi

          echo "✅ Checkout smoke test passed (HTTP ${HTTP_STATUS}, sessionId present)"
