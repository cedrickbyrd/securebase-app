name: Terraform Plan

on:
  pull_request:
    branches: [main]
    paths:
      - 'landing-zone/**'
      - 'terraform/**'
      - '.github/workflows/terraform-plan.yml'

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  TF_VERSION: '1.7.5'
  PLAN_COMMENT_MAX_CHARS: '65000'

jobs:
  terraform-plan:
    name: terraform plan (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - workspace: dev
            tf_dir: landing-zone/environments/dev
          - workspace: staging
            tf_dir: landing-zone/environments/staging
          - workspace: prod
            tf_dir: landing-zone/environments/prod-us-west-2

    defaults:
      run:
        working-directory: ${{ matrix.tf_dir }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.2.0
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4.2.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Check backend configuration
        id: backend_check
        run: |
          if [ -z "$TF_BACKEND_BUCKET" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::TF_BACKEND_BUCKET secret is not set. Plan for '${{ matrix.workspace }}' will be skipped."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          TF_BACKEND_BUCKET: ${{ secrets.TF_BACKEND_BUCKET }}

      - name: Terraform init
        if: steps.backend_check.outputs.configured == 'true'
        run: |
          terraform init -input=false -reconfigure \
            -backend-config="bucket=${{ secrets.TF_BACKEND_BUCKET }}" \
            -backend-config="key=landing-zone/${{ matrix.workspace }}/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="dynamodb_table=${{ secrets.TF_BACKEND_LOCK_TABLE }}"

      - name: Select workspace
        if: steps.backend_check.outputs.configured == 'true'
        run: terraform workspace select ${{ matrix.workspace }} || terraform workspace new ${{ matrix.workspace }}

      - name: Terraform validate
        if: steps.backend_check.outputs.configured == 'true'
        run: terraform validate

      - name: Terraform plan
        if: steps.backend_check.outputs.configured == 'true'
        id: plan
        run: |
          set +e
          terraform plan -no-color -input=false -detailed-exitcode > plan.txt
          CODE=$?
          set -e
          if [ "$CODE" -eq 1 ]; then
            echo "Terraform plan failed"
            cat plan.txt
            exit 1
          fi
          if [ "$CODE" -eq 2 ]; then
            echo "changes_detected=true" >> "$GITHUB_OUTPUT"
          else
            echo "changes_detected=false" >> "$GITHUB_OUTPUT"
          fi
          echo "plan_file=${{ matrix.workspace }}-plan.txt" >> "$GITHUB_OUTPUT"
          cp plan.txt "${{ matrix.workspace }}-plan.txt"

      - name: Upload full plan artifact
        if: steps.backend_check.outputs.configured == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: terraform-plan-${{ matrix.workspace }}-${{ github.run_id }}
          path: ${{ matrix.tf_dir }}/${{ matrix.workspace }}-plan.txt
          retention-days: 7

      - name: Comment plan on PR
        if: steps.backend_check.outputs.configured == 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          WORKSPACE: ${{ matrix.workspace }}
          TF_DIR: ${{ matrix.tf_dir }}
        with:
          script: |
            const fs = require('fs');
            const workspace = process.env.WORKSPACE;
            const tfDir = process.env.TF_DIR;
            const planPath = `${process.env.GITHUB_WORKSPACE}/${tfDir}/${workspace}-plan.txt`;
            const fullPlan = fs.readFileSync(planPath, 'utf8');
            const maxChars = Number(process.env.PLAN_COMMENT_MAX_CHARS || '65000');
            const content = fullPlan.length > maxChars
              ? `${fullPlan.slice(0, maxChars)}\n\n...truncated, full output in workflow artifact...`
              : fullPlan;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Terraform Plan (${workspace})\n\n\`\`\`terraform\n${content}\n\`\`\``
            });
