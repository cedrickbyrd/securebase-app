name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - 'landing-zone/**'
      - 'terraform/**'
      - '.github/workflows/terraform-apply.yml'

concurrency:
  group: terraform-apply-${{ github.sha }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  TF_VERSION: '1.7.5'

jobs:
  terraform-apply:
    name: terraform apply (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    concurrency:
      group: terraform-apply-workspace-${{ matrix.workspace }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        include:
          - workspace: dev
            tf_dir: landing-zone/environments/dev
          - workspace: staging
            tf_dir: landing-zone/environments/staging
          - workspace: prod-us-west-2
            tf_dir: landing-zone/environments/prod-us-west-2
          - workspace: prod
            tf_dir: landing-zone/environments/prod

    defaults:
      run:
        working-directory: ${{ matrix.tf_dir }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54531c595c77c2be4c718aaa20ff3eda87d6 # v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Check backend configuration
        id: backend_check
        run: |
          if [ -z "$TF_BACKEND_BUCKET" ] || [ -z "$TF_BACKEND_LOCK_TABLE" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::TF_BACKEND_BUCKET or TF_BACKEND_LOCK_TABLE secret is not set. Apply for '${{ matrix.workspace }}' will be skipped."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          TF_BACKEND_BUCKET: ${{ secrets.TF_BACKEND_BUCKET }}
          TF_BACKEND_LOCK_TABLE: ${{ secrets.TF_BACKEND_LOCK_TABLE }}

      - name: Terraform init
        if: steps.backend_check.outputs.configured == 'true'
        run: |
          terraform init -input=false -reconfigure \
            -backend-config="backend.hcl" \
            -backend-config="bucket=${{ secrets.TF_BACKEND_BUCKET }}"

      - name: Check for existing state lock
        if: steps.backend_check.outputs.configured == 'true'
        run: |
          echo "## Terraform State Lock Check — ${{ matrix.workspace }}" >> "$GITHUB_STEP_SUMMARY"
          TF_STATE_KEY=$(grep '^[[:space:]]*key[[:space:]]*=' backend.hcl | awk -F'"' '{print $2}')
          if [ -z "$TF_STATE_KEY" ]; then
            echo "::error::Failed to extract state key from backend.hcl"
            exit 1
          fi
          LOCK=$(aws dynamodb get-item \
            --table-name "${{ secrets.TF_BACKEND_LOCK_TABLE }}" \
            --key "$(jq -n --arg bucket "${{ secrets.TF_BACKEND_BUCKET }}" --arg key "$TF_STATE_KEY" '{LockID: {S: "\($bucket)/\($key)"}}')" \
            --query "Item.Info.S" \
            --output text 2>/dev/null || echo "None")
          if [ "$LOCK" != "None" ] && [ -n "$LOCK" ]; then
            echo "::warning::State lock currently held: $LOCK"
            echo "**⚠️ State lock held:** \`$LOCK\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**✅ No active state lock**" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Select workspace
        if: steps.backend_check.outputs.configured == 'true'
        run: terraform workspace select ${{ matrix.workspace }} || terraform workspace new ${{ matrix.workspace }}

      - name: Terraform apply
        if: steps.backend_check.outputs.configured == 'true'
        run: |
          APPLY_ARGS="-auto-approve -input=false"
          if [ -f terraform.tfvars ]; then
            APPLY_ARGS="$APPLY_ARGS -var-file=terraform.tfvars"
          fi
          if [ "${{ matrix.workspace }}" = "prod" ] && [ -f marketplace.tfvars ]; then
            APPLY_ARGS="$APPLY_ARGS -var-file=marketplace.tfvars"
          fi
          terraform apply $APPLY_ARGS

  notify-slack:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs: terraform-apply
    if: always()
    steps:
      - name: Send deployment status to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not configured; skipping notification"
            exit 0
          fi

          if [ "${{ needs.terraform-apply.result }}" = "success" ]; then
            STATUS_TEXT="✅ Terraform apply succeeded on main"
            COLOR="good"
          else
            STATUS_TEXT="❌ Terraform apply failed on main"
            COLOR="danger"
          fi

          payload=$(cat <<EOF
          {
            "attachments": [
              {
                "color": "${COLOR}",
                "text": "${STATUS_TEXT}\nRepository: ${{ github.repository }}\nRun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              }
            ]
          }
          EOF
          )

          curl -sS -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL"
