name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - 'landing-zone/**'
      - 'terraform/**'
      - '.github/workflows/terraform-apply.yml'

# Top-level concurrency prevents duplicate workflow runs for the same commit.
# Per-workspace concurrency is enforced at the job level below.
concurrency:
  group: terraform-apply-${{ github.sha }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  TF_VERSION: '1.7.5'

jobs:
  terraform-apply:
    name: terraform apply (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    # Serialize applies per workspace so two concurrent workflow runs cannot
    # attempt a terraform apply on the same environment simultaneously.
    # cancel-in-progress: false means a queued run waits rather than being
    # dropped — critical for infrastructure state safety.
    concurrency:
      group: terraform-apply-workspace-${{ matrix.workspace }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        include:
          - workspace: dev
            tf_dir: landing-zone/environments/dev
          - workspace: staging
            tf_dir: landing-zone/environments/staging
          - workspace: prod
            tf_dir: landing-zone/environments/prod-us-west-2

    defaults:
      run:
        working-directory: ${{ matrix.tf_dir }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Check backend configuration
        id: backend_check
        run: |
          if [ -z "$TF_BACKEND_BUCKET" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::TF_BACKEND_BUCKET secret is not set. Apply for '${{ matrix.workspace }}' will be skipped."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          TF_BACKEND_BUCKET: ${{ secrets.TF_BACKEND_BUCKET }}

      - name: Terraform init
        if: steps.backend_check.outputs.configured == 'true'
        run: |
          terraform init -input=false -reconfigure \
            -backend-config="bucket=${{ secrets.TF_BACKEND_BUCKET }}" \
            -backend-config="key=landing-zone/${{ matrix.workspace }}/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="dynamodb_table=${{ secrets.TF_BACKEND_LOCK_TABLE }}"

      - name: Check for existing state lock
        if: steps.backend_check.outputs.configured == 'true'
        # The LockID key matches the backend S3 key pattern used in the init
        # step above.  If the backend key path ever changes, update both places.
        run: |
          echo "## Terraform State Lock Check — ${{ matrix.workspace }}" >> "$GITHUB_STEP_SUMMARY"
          LOCK=$(aws dynamodb get-item \
            --table-name "${{ secrets.TF_BACKEND_LOCK_TABLE }}" \
            --key "{\"LockID\":{\"S\":\"landing-zone/${{ matrix.workspace }}/terraform.tfstate\"}}" \
            --query "Item.Info.S" \
            --output text 2>/dev/null || echo "None")
          if [ "$LOCK" != "None" ] && [ -n "$LOCK" ]; then
            echo "::warning::State lock currently held: $LOCK"
            echo "**⚠️ State lock held:** \`$LOCK\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**✅ No active state lock**" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Select workspace
        if: steps.backend_check.outputs.configured == 'true'
        run: terraform workspace select ${{ matrix.workspace }} || terraform workspace new ${{ matrix.workspace }}

      - name: Terraform apply
        if: steps.backend_check.outputs.configured == 'true'
        run: |
          APPLY_ARGS="-auto-approve -input=false"
          if [ -f terraform.tfvars ]; then
            APPLY_ARGS="$APPLY_ARGS -var-file=terraform.tfvars"
          fi
          terraform apply $APPLY_ARGS

  notify-slack:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs: terraform-apply
    if: always()
    steps:
      - name: Send deployment status to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not configured; skipping notification"
            exit 0
          fi

          if [ "${{ needs.terraform-apply.result }}" = "success" ]; then
            STATUS_TEXT="✅ Terraform apply succeeded on main"
            COLOR="good"
          else
            STATUS_TEXT="❌ Terraform apply failed on main"
            COLOR="danger"
          fi

          payload=$(cat <<EOF
          {
            "attachments": [
              {
                "color": "${COLOR}",
                "text": "${STATUS_TEXT}\nRepository: ${{ github.repository }}\nRun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              }
            ]
          }
          EOF
          )

          curl -sS -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL"
