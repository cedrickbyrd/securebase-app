name: Terraform Validate (Multi-Region Module)

on:
  pull_request:
    branches: [main]
    paths:
      - "landing-zone/**"

permissions:
  contents: read

env:
  TF_VERSION: "1.5.7"

jobs:
  validate-multi-region:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing-zone/modules/multi-region

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Stub aws.secondary provider for standalone validate
        run: |
          # Create a CI-only concrete provider config for aws.secondary so that
          # terraform validate can resolve the provider alias when this module
          # is validated directly (not called from a parent module).
          # The stub uses dummy credentials; it is NOT used during real deployments.
          cat > ci_provider_stub.tf << 'EOF'
          provider "aws" {
            alias                       = "secondary"
            region                      = "us-west-2"
            skip_credentials_validation = true
            skip_requesting_account_id  = true
            skip_metadata_api_check     = true
            access_key                  = "MOCK_ACCESS_KEY_NOT_USED"
            secret_key                  = "MOCK_SECRET_KEY_NOT_USED"
          }
          EOF

      - name: Terraform validate
        run: terraform validate

      - name: Setup TFLint
        if: ${{ hashFiles('landing-zone/modules/multi-region/.tflint.hcl') != '' }}
        uses: terraform-linters/setup-tflint@6e87008f9dd1fe3e34e66aca6c97b4a69f72a7f4
        with:
          tflint_version: latest

      - name: Run TFLint
        if: ${{ hashFiles('landing-zone/modules/multi-region/.tflint.hcl') != '' }}
        run: tflint --init && tflint
