name: E2E Tests (Playwright)

# End-to-end tests for the Phase 3a customer portal.
# Runs on every PR that modifies portal source code.

on:
  pull_request:
    branches:
      - main
    paths:
      - 'phase3a-portal/**'
      - '.github/workflows/e2e-tests.yml'
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Portal base URL for E2E tests'
        required: false
        default: 'http://localhost:5173'

permissions:
  contents: read
  pull-requests: write

env:
  NODE_VERSION: '20'
  PLAYWRIGHT_VERSION: '1.44.0'

jobs:
  # ---------------------------------------------------------------------------
  # Job: E2E Tests
  # ---------------------------------------------------------------------------
  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: phase3a-portal

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: phase3a-portal/package-lock.json
          registry-url: 'https://registry.npmjs.org'

      - name: Verify npm registry connectivity
        run: |
          echo "Checking npm registry connectivity..."
          if ! curl -sf --max-time 10 https://registry.npmjs.org > /dev/null; then
            echo "::error::Cannot reach registry.npmjs.org — npm ci will fail. Check runner DNS/network."
            exit 1
          fi
          echo "Registry reachable ✓"
          npm config set registry https://registry.npmjs.org
          npm config get registry

      - name: Install dependencies
        run: npm ci

      - name: Check for lock file drift
        run: |
          echo "Checking for package-lock.json drift..."
          if npm install --dry-run 2>&1 | grep -q "added\|removed\|changed"; then
            echo "::warning::package-lock.json is out of sync with package.json. Run 'npm install' locally and commit the updated lock file."
          else
            echo "Lock file is in sync ✓"
          fi

      - name: Install Playwright browsers (all configured projects)
        run: npx playwright install --with-deps

      - name: Build portal (demo mode for E2E)
        run: npm run build
        env:
          VITE_DEMO_MODE: 'true'
          VITE_USE_MOCK_API: 'true'
          VITE_API_BASE_URL: 'http://localhost:5173'

      - name: Run Playwright compliance tests
        working-directory: phase3a-portal
        env:
          CI: true
          BASE_URL: ${{ github.event.inputs.base_url || 'http://localhost:5173' }}
          PORTAL_URL: https://portal.securebase.tximhotep.com
          TEST_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_PASSWORD }}
          TEST_ADMIN_EMAIL: ${{ secrets.PLAYWRIGHT_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.PLAYWRIGHT_ADMIN_PASSWORD }}
        run: |
          npx playwright test tests/e2e/compliance-score-endpoints.spec.js --reporter=list

      - name: Start portal preview server
        run: npx vite preview --port 5173 &
        env:
          NODE_ENV: test

      - name: Wait for portal to be ready
        run: |
          timeout 30 bash -c 'until curl -sf http://localhost:5173; do sleep 1; done'

      - name: Run Playwright E2E tests (includes compliance-scores.spec.js)
        run: |
          if [ -d "tests/e2e" ]; then
            npx playwright test tests/e2e/ \
              --reporter=html \
              --timeout=30000
          else
            echo "No E2E tests found in tests/e2e/ yet — skipping."
            echo "TODO: Create tests/e2e/ directory with Playwright specs."
          fi
        env:
          BASE_URL: ${{ github.event.inputs.base_url || 'http://localhost:5173' }}
          VITE_DEMO_MODE: 'true'
          VITE_USE_MOCK_API: 'true'

      - name: Upload test report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: phase3a-portal/playwright-report/
          retention-days: 14

      - name: Upload test screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-screenshots
          path: phase3a-portal/test-results/
          retention-days: 7
