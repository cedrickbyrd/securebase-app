name: E2E Tests (Playwright)

# End-to-end tests for the Phase 3a customer portal.
# Runs on every PR that modifies portal source code.

on:
  pull_request:
    branches:
      - main
    paths:
      - 'phase3a-portal/**'
      - '.github/workflows/e2e-tests.yml'
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Portal base URL for E2E tests'
        required: false
        default: 'http://localhost:5173'

permissions:
  contents: read
  pull-requests: write

env:
  NODE_VERSION: '20'
  PLAYWRIGHT_VERSION: '1.44.0'

jobs:
  # ---------------------------------------------------------------------------
  # Job: E2E Tests
  # ---------------------------------------------------------------------------
  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: phase3a-portal

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: phase3a-portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build portal (demo mode for E2E)
        run: npm run build
        env:
          VITE_DEMO_MODE: 'true'
          VITE_USE_MOCK_API: 'true'
          VITE_API_BASE_URL: 'http://localhost:5173'

      - name: Start portal preview server
        run: npx vite preview --port 5173 &
        env:
          NODE_ENV: test

      - name: Wait for portal to be ready
        run: |
          timeout 30 bash -c 'until curl -sf http://localhost:5173; do sleep 1; done'

      - name: Run Playwright E2E tests
        run: |
          if [ -d "tests/e2e" ]; then
            npx playwright test tests/e2e/ \
              --reporter=html \
              --timeout=30000
          else
            echo "No E2E tests found in tests/e2e/ yet — skipping."
            echo "TODO: Create tests/e2e/ directory with Playwright specs."
          fi
        env:
          BASE_URL: ${{ github.event.inputs.base_url || 'http://localhost:5173' }}
          VITE_DEMO_MODE: 'true'
          VITE_USE_MOCK_API: 'true'

      - name: Upload test report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: phase3a-portal/playwright-report/
          retention-days: 14

      - name: Upload test screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-screenshots
          path: phase3a-portal/test-results/
          retention-days: 7
