name: E2E Tests (Playwright)

# End-to-end tests for the Phase 3a customer portal.
# Runs on every PR that modifies portal source code.

on:
  pull_request:
    branches:
      - main
    paths:
      - 'phase3a-portal/**'
      - '.github/workflows/e2e-tests.yml'
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Portal base URL for E2E tests'
        required: false
        default: 'https://portal.securebase.tximhotep.com'

permissions:
  contents: read
  pull-requests: write

env:
  NODE_VERSION: '20'
  PLAYWRIGHT_VERSION: '1.44.0'

jobs:
  # ---------------------------------------------------------------------------
  # Job: E2E Tests
  # ---------------------------------------------------------------------------
  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: phase3a-portal

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: phase3a-portal/package-lock.json
          registry-url: 'https://registry.npmjs.org'

      - name: Verify npm registry connectivity
        run: |
          echo "Checking npm registry connectivity..."
          if ! curl -sf --max-time 10 https://registry.npmjs.org > /dev/null; then
            echo "::error::Cannot reach registry.npmjs.org — npm ci will fail. Check runner DNS/network."
            exit 1
          fi
          echo "Registry reachable ✓"
          npm config set registry https://registry.npmjs.org
          npm config get registry

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (chromium only for CI speed)
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: |
          npx playwright test tests/e2e/ \
            --project=chromium \
            --reporter=list \
            --timeout=30000
        env:
          CI: true
          PORTAL_URL: ${{ github.event.inputs.base_url || 'https://portal.securebase.tximhotep.com' }}
          TEST_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_PASSWORD }}
          TEST_ADMIN_EMAIL: ${{ secrets.PLAYWRIGHT_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.PLAYWRIGHT_ADMIN_PASSWORD }}

      - name: Upload test report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: phase3a-portal/playwright-report/
          retention-days: 14

      - name: Upload test screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-screenshots
          path: phase3a-portal/test-results/
          retention-days: 7
