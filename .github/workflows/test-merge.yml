name: Test Merge

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to test merge for'
        required: false
        default: ''
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint root project
        run: npm run lint

      - name: Build root project
        run: npm run build

      - name: Install phase3a-portal dependencies
        run: |
          cd phase3a-portal
          npm install --legacy-peer-deps

      - name: Lint phase3a-portal
        run: |
          cd phase3a-portal
          npm run lint

      - name: Build phase3a-portal
        run: |
          cd phase3a-portal
          npm run build

      - name: Summary
        if: success()
        run: |
          echo "✅ All lint and build checks passed — merge is clean."
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
