name: Online Sales E2E

# End-to-end testing for the complete SecureBase customer sales and onboarding journey.
#
# Covers four phases:
#   Phase 1 – Infrastructure Setup  (Lambda packaging, layer, Terraform validation)
#   Phase 2 – E2E Testing Execution (unit, auth, API, security, portal, performance)
#   Phase 3 – Complete Customer Journey (signup → Stripe → onboarding → webhook)
#   Phase 4 – Documentation & Monitoring (docs check, dashboard validation, report)

on:
  push:
    branches:
      - main
      - 'feature/sales/**'
      - 'copilot/**'
  pull_request:
    branches:
      - main
  schedule:
    # Run nightly at 3 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: false
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - production
      run_full_suite:
        description: 'Run full test suite (slower)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read
  pull-requests: write
  actions: read

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}

# ─────────────────────────────────────────────────────────────────────────────
# PHASE 1 – Infrastructure Setup
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ── 1a. Package all sales-path Lambda functions ──────────────────────────
  package-lambdas:
    name: 'Phase 1 · Package Lambda Functions'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Package all sales-path Lambda functions
        run: |
          set -e
          FUNCTIONS_DIR="phase2-backend/functions"
          DEPLOY_DIR="phase2-backend/deploy/sales"
          mkdir -p "${DEPLOY_DIR}"

          SALES_LAMBDAS=(
            "create_checkout_session"
            "stripe_webhook"
            "trigger_onboarding"
            "auth_v2"
            "webhook_manager"
            "billing_worker"
            "support_tickets"
            "cost_forecasting"
          )

          MISSING=0
          for fn in "${SALES_LAMBDAS[@]}"; do
            src="${FUNCTIONS_DIR}/${fn}.py"
            zip_name="${fn//_/-}.zip"
            if [ -f "${src}" ]; then
              zip -j "${DEPLOY_DIR}/${zip_name}" "${src}"
              echo "✅ Packaged ${fn} → ${zip_name}"
            else
              echo "⚠️  ${fn}.py not found – skipping"
              MISSING=$((MISSING + 1))
            fi
          done

          echo ""
          echo "── Deployment packages ──"
          ls -lh "${DEPLOY_DIR}"
          echo ""
          echo "Missing functions: ${MISSING}"
          # Non-zero missing counts are acceptable (some fns may live in layers)

      - name: Upload Lambda packages as artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-packages-sales
          path: phase2-backend/deploy/sales/
          retention-days: 7

  # ── 1b. Build Lambda layer (Python dependencies) ─────────────────────────
  build-lambda-layer:
    name: 'Phase 1 · Build Lambda Layer'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install layer dependencies
        run: |
          set -e
          mkdir -p /tmp/lambda-layer/python

          # Install production dependencies targeting the Lambda runtime ABI.
          # psycopg2-binary must come from a manylinux wheel to work on Lambda.
          pip install \
            --target /tmp/lambda-layer/python \
            --platform manylinux2014_x86_64 \
            --python-version 3.11 \
            --only-binary=:all: \
            --upgrade \
            psycopg2-binary \
            PyJWT \
            cryptography \
            stripe \
            requests \
            python-dateutil \
            bcrypt \
            pyotp \
            || pip install \
                 --target /tmp/lambda-layer/python \
                 --upgrade \
                 psycopg2-binary PyJWT cryptography stripe requests python-dateutil bcrypt pyotp

          # Copy hand-written Lambda Layer utilities
          if [ -d "phase2-backend/lambda_layer/python" ]; then
            cp -r phase2-backend/lambda_layer/python/. /tmp/lambda-layer/python/
            echo "✅ Copied lambda_layer utilities"
          fi

          echo "Layer contents (top-level packages):"
          ls /tmp/lambda-layer/python | head -20

      - name: Create layer zip
        run: |
          cd /tmp/lambda-layer
          zip -r /tmp/lambda-layer.zip python/
          echo "Layer size: $(du -sh /tmp/lambda-layer.zip | cut -f1)"

      - name: Upload layer artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-layer-sales
          path: /tmp/lambda-layer.zip
          retention-days: 7

  # ── 1c. Validate Terraform modules ───────────────────────────────────────
  validate-terraform:
    name: 'Phase 1 · Validate Terraform'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~1.7'

      - name: Terraform format check (non-blocking)
        run: terraform fmt -check -recursive landing-zone/ || echo "⚠️  Format issues found (non-blocking)"
        continue-on-error: true

      - name: Validate landing-zone root module
        run: |
          cd landing-zone
          terraform init -backend=false -input=false
          terraform validate
          echo "✅ landing-zone root module is valid"

      - name: Validate individual modules
        run: |
          PASS=0; FAIL=0
          for mod in landing-zone/modules/*/; do
            if [ -f "${mod}main.tf" ]; then
              echo "  Validating ${mod}..."
              (cd "${mod}" && terraform init -backend=false -input=false -upgrade 2>/dev/null && terraform validate) \
                && { echo "  ✅ ${mod} OK"; PASS=$((PASS+1)); } \
                || { echo "  ⚠️  ${mod} has issues (may need provider context)"; FAIL=$((FAIL+1)); }
            fi
          done
          echo ""
          echo "Module validation: ${PASS} passed, ${FAIL} skipped/failed"

# ─────────────────────────────────────────────────────────────────────────────
# PHASE 2 – E2E Testing Execution
# ─────────────────────────────────────────────────────────────────────────────

  # ── 2a. Backend unit tests ────────────────────────────────────────────────
  backend-unit-tests:
    name: 'Phase 2 · Backend Unit Tests'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [package-lambdas]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: phase2-backend/functions/requirements.txt

      - name: Install test dependencies
        run: |
          pip install --upgrade pip
          pip install \
            pytest pytest-cov pytest-mock \
            PyJWT bcrypt pyotp stripe requests \
            python-dateutil coverage

      - name: Run Lambda unit tests
        env:
          PYTHONPATH: phase2-backend/lambda_layer/python:phase2-backend/functions
        run: |
          cd phase2-backend/functions
          python -m pytest test_*.py \
            -v \
            --tb=short \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:../../test-results/coverage-backend.xml \
            --junitxml=../../test-results/junit-backend.xml \
            2>&1
        continue-on-error: true

      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-unit-test-results
          path: test-results/
          retention-days: 14

  # ── 2b. Authentication flow tests ────────────────────────────────────────
  auth-flow-tests:
    name: 'Phase 2 · Authentication Flow Tests'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [package-lambdas]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install pytest pytest-mock PyJWT bcrypt pyotp stripe requests

      - name: Run authentication flow tests
        env:
          PYTHONPATH: phase2-backend/lambda_layer/python:phase2-backend/functions
        run: |
          mkdir -p test-results
          cd phase2-backend/functions
          python -m pytest test_auth_v2.py -v \
            --tb=short \
            --junitxml=../../test-results/junit-auth.xml \
            2>&1
        continue-on-error: true

      - name: Upload auth test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auth-flow-test-results
          path: test-results/junit-auth.xml
          retention-days: 7

  # ── 2c. Security static analysis ─────────────────────────────────────────
  security-scan:
    name: 'Phase 2 · Security Static Analysis'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security scanners
        run: pip install bandit safety

      - name: Run Bandit (Python security linting)
        run: |
          mkdir -p test-results
          bandit -r phase2-backend/functions/ \
            -x phase2-backend/functions/test_*.py \
            --severity-level medium \
            -f json \
            -o test-results/bandit-report.json \
            2>&1 || true

          # Print human-readable summary
          bandit -r phase2-backend/functions/ \
            -x phase2-backend/functions/test_*.py \
            --severity-level medium \
            2>&1 || echo "⚠️  Bandit found issues – review bandit-report.json"

      - name: Check dependencies for known CVEs
        run: |
          pip install -r phase2-backend/functions/requirements.txt 2>/dev/null || true
          safety check \
            -r phase2-backend/functions/requirements.txt \
            --output screen \
            2>&1 || echo "⚠️  Safety check found vulnerabilities – review above"
        continue-on-error: true

      - name: Upload security scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results
          path: test-results/bandit-report.json
          retention-days: 14

  # ── 2d. React portal build & integration check ───────────────────────────
  portal-integration:
    name: 'Phase 2 · Portal Build & Integration'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: phase3a-portal/package-lock.json

      - name: Install portal dependencies
        working-directory: phase3a-portal
        run: npm ci || npm install

      - name: Lint portal code
        working-directory: phase3a-portal
        run: npm run lint 2>&1 || echo "⚠️  Lint issues found (non-blocking)"
        continue-on-error: true

      - name: Build portal (demo mode)
        working-directory: phase3a-portal
        env:
          VITE_ENVIRONMENT: demo
          VITE_API_BASE_URL: https://api-dev.securebase.example.com
          VITE_STRIPE_PUBLIC_KEY: pk_test_placeholder
          VITE_DEMO_MODE: 'true'
        run: npm run build

      - name: Verify build output
        working-directory: phase3a-portal
        run: |
          echo "── Build output ──"
          ls -lh dist/ 2>/dev/null || ls -lh build/ 2>/dev/null
          echo "✅ Portal builds successfully"

      - name: Run portal unit tests
        working-directory: phase3a-portal
        run: |
          npm test -- --run 2>&1 | tail -30 || \
          npx vitest run 2>&1 | tail -30 || \
          echo "ℹ️  No unit test runner configured – skipping"
        continue-on-error: true

  # ── 2e. API endpoint validation (mock-based) ─────────────────────────────
  api-endpoint-tests:
    name: 'Phase 2 · API Endpoint Tests'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [backend-unit-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install pytest pytest-mock PyJWT stripe requests python-dateutil bcrypt pyotp

      - name: Validate API handler response shapes
        env:
          PYTHONPATH: phase2-backend/lambda_layer/python:phase2-backend/functions
        run: |
          python3 - << 'PYEOF'
          """
          Validates that each sales-path Lambda function returns a well-formed
          API Gateway proxy response without requiring deployed infrastructure.
          """
          import sys, os, json
          from unittest.mock import patch, MagicMock

          sys.path.insert(0, 'phase2-backend/lambda_layer/python')
          sys.path.insert(0, 'phase2-backend/functions')

          # Patch heavy dependencies before importing function modules
          for mod in ['psycopg2', 'psycopg2.pool', 'psycopg2.extras',
                      'boto3', 'botocore', 'botocore.exceptions']:
              sys.modules[mod] = MagicMock()

          REQUIRED_KEYS = {'statusCode', 'headers', 'body'}
          results = []

          # ── checkout endpoint ─────────────────────────────────────────────
          try:
              import importlib
              ccs = importlib.import_module('create_checkout_session')
              with patch.object(ccs, 'stripe') as mock_stripe, \
                   patch.object(ccs, 'get_db_connection', return_value=MagicMock()), \
                   patch.object(ccs, 'check_rate_limit', return_value=True):
                  mock_stripe.checkout.Session.create.return_value = MagicMock(
                      url='https://checkout.stripe.com/test', id='cs_test_123')
                  event = {
                      'body': json.dumps({'tier': 'standard',
                                          'email': 'test@example.com',
                                          'name': 'Test Co'}),
                      'requestContext': {'identity': {'sourceIp': '127.0.0.1'}}
                  }
                  resp = ccs.lambda_handler(event, {})
                  missing = REQUIRED_KEYS - set(resp.keys())
                  ok = not missing and isinstance(resp['statusCode'], int)
                  results.append(('create_checkout_session', ok,
                                  f"statusCode={resp.get('statusCode')}"))
          except Exception as exc:
              results.append(('create_checkout_session', False, str(exc)))

          # ── auth endpoint ─────────────────────────────────────────────────
          try:
              import auth_v2
              with patch.object(auth_v2, 'get_api_key_by_prefix',
                                 return_value={'customer_id': 'c1',
                                               'email': 'x@y.com',
                                               'tier': 'standard',
                                               'key_id': 'k1'}), \
                   patch.object(auth_v2, 'jwt') as mock_jwt:
                  mock_jwt.encode.return_value = 'tok'
                  resp = auth_v2.lambda_handler(
                      {'headers': {'Authorization': 'Bearer sk_test_key'}}, {})
                  ok = isinstance(resp.get('statusCode'), int)
                  results.append(('auth_v2', ok, f"statusCode={resp.get('statusCode')}"))
          except Exception as exc:
              results.append(('auth_v2', False, str(exc)))

          # ── print results ─────────────────────────────────────────────────
          print('\n── API Handler Shape Validation ──')
          passed = 0
          for name, ok, detail in results:
              status = '✅' if ok else '⚠️ '
              print(f'  {status} {name}: {detail}')
              if ok:
                  passed += 1
          print(f'\n{passed}/{len(results)} handlers validated\n')
          PYEOF

  # ── 2f. Performance / load-time checks ───────────────────────────────────
  performance-checks:
    name: 'Phase 2 · Performance Checks'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check portal bundle size
        working-directory: phase3a-portal
        run: |
          npm ci || npm install 2>/dev/null
          VITE_DEMO_MODE=true VITE_ENVIRONMENT=demo \
            VITE_API_BASE_URL=https://api-dev.securebase.example.com \
            npm run build 2>&1 | tail -20

          # Warn if any individual JS chunk exceeds 512 KB
          echo ""
          echo "── Bundle size analysis ──"
          find dist/assets -name '*.js' 2>/dev/null | while read f; do
            SIZE_KB=$(du -k "$f" | cut -f1)
            LABEL="✅"
            [ "$SIZE_KB" -gt 512 ] && LABEL="⚠️  (>512 KB)"
            echo "  ${LABEL} $(basename $f): ${SIZE_KB} KB"
          done || echo "dist/assets not found – skipping"
        env:
          VITE_STRIPE_PUBLIC_KEY: pk_test_placeholder
        continue-on-error: true

      - name: Validate SLA requirements in code
        run: |
          echo "── Checking SLA constants in codebase ──"
          # Verify timeout and SLA values are within acceptable ranges
          grep -rn "timeout\|latency\|SLA\|p95\|p99" \
            phase2-backend/functions/ \
            --include="*.py" -l 2>/dev/null | head -10 || echo "No SLA references found"

# ─────────────────────────────────────────────────────────────────────────────
# PHASE 3 – Complete Customer Journey
# ─────────────────────────────────────────────────────────────────────────────

  customer-journey-e2e:
    name: 'Phase 3 · Complete Customer Journey'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [backend-unit-tests, auth-flow-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install test dependencies
        run: |
          pip install pytest pytest-mock PyJWT stripe requests python-dateutil bcrypt pyotp

      - name: Run existing pilot signup E2E test
        env:
          PYTHONPATH: phase2-backend/lambda_layer/python:phase2-backend/functions
          STRIPE_SECRET_KEY: sk_test_mock
          STRIPE_WEBHOOK_SECRET: whsec_mock
          STRIPE_PRICE_HEALTHCARE: price_mock_healthcare
          STRIPE_PILOT_COUPON: pilot50off
          PORTAL_URL: https://portal.test.securebase.io
          SNS_TOPIC_ARN: arn:aws:sns:us-east-1:123456789012:onboarding
          SES_SENDER_EMAIL: noreply@test.securebase.io
          ONBOARDING_FUNCTION_NAME: test-trigger-onboarding
        run: |
          mkdir -p test-results
          python -m pytest tests/e2e/test_pilot_signup.py -v \
            --tb=short \
            --junitxml=test-results/junit-pilot-signup.xml \
            2>&1
        continue-on-error: true

      - name: Run complete sales journey E2E tests
        env:
          PYTHONPATH: phase2-backend/lambda_layer/python:phase2-backend/functions
          STRIPE_SECRET_KEY: sk_test_mock
          STRIPE_WEBHOOK_SECRET: whsec_mock
          STRIPE_PRICE_STANDARD: price_mock_standard
          STRIPE_PRICE_HEALTHCARE: price_mock_healthcare
          STRIPE_PRICE_FINTECH: price_mock_fintech
          STRIPE_PRICE_GOVERNMENT: price_mock_government
          SNS_TOPIC_ARN: arn:aws:sns:us-east-1:123456789012:onboarding
          SES_SENDER_EMAIL: noreply@test.securebase.io
          ONBOARDING_FUNCTION_NAME: test-trigger-onboarding
          PORTAL_URL: https://portal.test.securebase.io
        run: |
          python -m pytest tests/e2e/test_sales_journey_e2e.py -v \
            --tb=short \
            --junitxml=test-results/junit-sales-journey.xml \
            2>&1
        continue-on-error: true

      - name: Upload customer journey test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: customer-journey-test-results
          path: test-results/
          retention-days: 14

# ─────────────────────────────────────────────────────────────────────────────
# PHASE 4 – Documentation & Monitoring
# ─────────────────────────────────────────────────────────────────────────────

  docs-and-monitoring:
    name: 'Phase 4 · Docs & Monitoring Validation'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate key documentation exists
        run: |
          echo "── Documentation completeness check ──"
          REQUIRED_DOCS=(
            "E2E_TESTING_GUIDE.md"
            "ONBOARDING_CHECKLIST.md"
            "DEPLOYMENT_STRATEGY.md"
            "README.md"
          )
          MISSING=0
          for doc in "${REQUIRED_DOCS[@]}"; do
            if [ -f "${doc}" ]; then
              echo "  ✅ ${doc}"
            else
              echo "  ❌ ${doc} is missing"
              MISSING=$((MISSING + 1))
            fi
          done
          echo ""
          [ "${MISSING}" -eq 0 ] && echo "All required docs present ✅" \
            || echo "⚠️  ${MISSING} doc(s) missing"

      - name: Validate CloudWatch dashboard config
        run: |
          echo "── Validating cloudwatch_dashboard.json ──"
          if [ -f "cloudwatch_dashboard.json" ]; then
            python3 -c "import json; d=json.load(open('cloudwatch_dashboard.json')); \
              widgets=d.get('widgets', []); \
              print(f'  ✅ Valid JSON – {len(widgets)} widget(s) defined')"
          else
            echo "  ⚠️  cloudwatch_dashboard.json not found"
          fi

      - name: Validate monitoring runbook exists
        run: |
          echo "── Runbook check ──"
          for f in SRE_RUNBOOK.md DR_RUNBOOK.md TROUBLESHOOTING.md; do
            [ -f "${f}" ] && echo "  ✅ ${f}" || echo "  ⚠️  ${f} not found"
          done

  # ── Final report ──────────────────────────────────────────────────────────
  e2e-report:
    name: 'E2E Report'
    runs-on: ubuntu-latest
    if: always()
    needs:
      - package-lambdas
      - build-lambda-layer
      - validate-terraform
      - backend-unit-tests
      - auth-flow-tests
      - security-scan
      - portal-integration
      - api-endpoint-tests
      - performance-checks
      - customer-journey-e2e
      - docs-and-monitoring

    steps:
      - name: Download all test artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
        continue-on-error: true

      - name: Generate E2E summary
        run: |
          {
            echo "# 🛒 Online Sales E2E – Results"
            echo ""
            echo "**Environment:** \`${{ env.ENVIRONMENT }}\`"
            echo "**Branch:** \`${{ github.ref_name }}\`"
            echo "**Triggered by:** \`${{ github.event_name }}\`"
            echo ""
            echo "## Phase 1 – Infrastructure Setup"
            echo "| Job | Status |"
            echo "|-----|--------|"

            result() {
              local job=$1
              local res=$2
              [ "$res" = "success" ] && echo "✅ Pass" || \
              ([ "$res" = "skipped" ] && echo "⊘ Skipped" || echo "❌ Fail")
            }

            echo "| Package Lambdas | $(result _ '${{ needs.package-lambdas.result }}') |"
            echo "| Build Lambda Layer | $(result _ '${{ needs.build-lambda-layer.result }}') |"
            echo "| Validate Terraform | $(result _ '${{ needs.validate-terraform.result }}') |"
            echo ""
            echo "## Phase 2 – E2E Testing Execution"
            echo "| Job | Status |"
            echo "|-----|--------|"
            echo "| Backend Unit Tests | $(result _ '${{ needs.backend-unit-tests.result }}') |"
            echo "| Auth Flow Tests | $(result _ '${{ needs.auth-flow-tests.result }}') |"
            echo "| Security Scan | $(result _ '${{ needs.security-scan.result }}') |"
            echo "| Portal Integration | $(result _ '${{ needs.portal-integration.result }}') |"
            echo "| API Endpoint Tests | $(result _ '${{ needs.api-endpoint-tests.result }}') |"
            echo "| Performance Checks | $(result _ '${{ needs.performance-checks.result }}') |"
            echo ""
            echo "## Phase 3 – Complete Customer Journey"
            echo "| Job | Status |"
            echo "|-----|--------|"
            echo "| Customer Journey E2E | $(result _ '${{ needs.customer-journey-e2e.result }}') |"
            echo ""
            echo "## Phase 4 – Documentation & Monitoring"
            echo "| Job | Status |"
            echo "|-----|--------|"
            echo "| Docs & Monitoring Validation | $(result _ '${{ needs.docs-and-monitoring.result }}') |"
            echo ""
            echo "---"
            echo "_Generated by the Online Sales E2E workflow – $(date -u)_"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail workflow if critical jobs failed
        run: |
          FAILED=0
          for result in \
            "${{ needs.package-lambdas.result }}" \
            "${{ needs.backend-unit-tests.result }}" \
            "${{ needs.customer-journey-e2e.result }}" \
            "${{ needs.portal-integration.result }}"; do
            if [ "$result" = "failure" ]; then
              FAILED=$((FAILED + 1))
            fi
          done
          if [ "$FAILED" -gt 0 ]; then
            echo "::error::${FAILED} critical job(s) failed. Review the summary above."
            exit 1
          fi
          echo "✅ All critical jobs passed."
