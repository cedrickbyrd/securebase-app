name: Contact Enrichment Pipeline

on:
  schedule:
    - cron: '0 7 * * 1'  # Monday 7AM UTC (before sales-lead-automation at 8AM)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  enrich:
    name: Enrich Banking + Healthcare Contacts via Hunter.io + PDL
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run contact enrichment
        env:
          HUNTER_API_KEY: ${{ secrets.HUNTER_API_KEY }}
          PDL_API_KEY: ${{ secrets.PDL_API_KEY }}
          ENRICHMENT_SENDER_IDENTITY: ${{ vars.ENRICHMENT_SENDER_IDENTITY || 'Cedrick Byrd | Principal Cloud Architect | U.S. Army Veteran | SecureBase | Dallas, TX' }}
        run: python .github/scripts/enrich_contacts.py

      - name: Commit enriched leads and heartbeat
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/data/last_run.txt
          git add .github/data/enriched_leads.json .github/data/last_run.txt
          if git diff --cached --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "chore: weekly marketing engine run [skip ci]"
            git push
          fi

      - name: Upload enriched leads artifact
        uses: actions/upload-artifact@v4
        with:
          name: enriched-leads-${{ github.run_number }}
          path: .github/data/enriched_leads.json
          retention-days: 30
