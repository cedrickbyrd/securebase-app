name: E2E Smoke Test – Signup → Verify → Provision

on:
  push:
    branches: [main]
    paths:
      - "lambda/verify_email.py"
      - "lambda/signup_handler.py"
      - "lambda/account_provisioner.py"
      - "lambda/onboarding_status.py"
      - "terraform/modules/customer-baseline/main.tf"
      - "database/migrations/003_customer_signup_onboarding.sql"
      - "tests/e2e/test_e2e_signup_flow.py"
      - ".github/workflows/e2e-signup-flow.yml"

  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options: [staging, production]
      cleanup:
        description: "Delete test data after run"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

concurrency:
  group: e2e-signup-${{ github.ref }}
  cancel-in-progress: false   # never cancel an in-flight E2E; let it finish

env:
  AWS_REGION: us-east-1
  PYTHON_VERSION: "3.11"

jobs:
  # ── Pre-flight: confirm Lambda functions exist before hitting the API ──
  preflight:
    name: Pre-flight Lambda check
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify Lambda functions deployed
        run: |
          for fn in signup-handler verify-email account-provisioner onboarding-status; do
            FN_NAME="securebase-staging-${fn}"
            STATE=$(aws lambda get-function-configuration \
              --function-name "$FN_NAME" \
              --query "State" --output text 2>/dev/null || echo "NOT_FOUND")
            if [ "$STATE" != "Active" ]; then
              echo "❌ Lambda not active: $FN_NAME (state=$STATE)"
              exit 1
            fi
            echo "✅ Lambda active: $FN_NAME"
          done

      - name: Verify API Gateway /verify-email route exists
        run: |
          API_ID=$(aws ssm get-parameter \
            --name "/securebase/api_gateway_id" \
            --query "Parameter.Value" --output text)
          ROUTES=$(aws apigatewayv2 get-routes \
            --api-id "$API_ID" \
            --query "Items[?RouteKey=='GET /verify-email'].RouteKey" \
            --output text)
          if [ -z "$ROUTES" ]; then
            echo "❌ GET /verify-email route not found in API Gateway $API_ID"
            echo "   Add the route before this test can pass."
            exit 1
          fi
          echo "✅ GET /verify-email route confirmed: $ROUTES"

  # ── Main E2E test ──────────────────────────────────────────────────────
  e2e:
    name: End-to-end signup → verify → provision
    runs-on: ubuntu-latest
    environment: staging
    needs: preflight
    permissions:
      id-token: write
      contents: read
      issues: write      # to open an issue on failure

    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install requests boto3 pytest --quiet

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch test config from SSM
        id: config
        run: |
          API_URL=$(aws ssm get-parameter \
            --name "/securebase/api/base_url" \
            --query "Parameter.Value" --output text)
          DB_SECRET=$(aws ssm get-parameter \
            --name "/securebase/db/secret_arn" \
            --query "Parameter.Value" --output text)
          echo "api_url=$API_URL"     >> "$GITHUB_OUTPUT"
          echo "db_secret=$DB_SECRET" >> "$GITHUB_OUTPUT"

      - name: Run E2E smoke test
        id: e2e
        env:
          API_BASE_URL:         ${{ steps.config.outputs.api_url }}
          TEST_EMAIL:           ${{ secrets.E2E_TEST_EMAIL }}
          DB_SECRET_ARN:        ${{ steps.config.outputs.db_secret }}
          AWS_REGION:           ${{ env.AWS_REGION }}
          PROVISIONER_TIMEOUT:  "45"
          CLEANUP:              ${{ github.event.inputs.cleanup || 'true' }}
        run: |
          python tests/e2e/test_e2e_signup_flow.py 2>&1 | tee e2e-output.txt
          exit ${PIPESTATUS[0]}

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-${{ github.run_id }}
          path: e2e-output.txt
          retention-days: 14

      # ── Open a GitHub issue on failure so it doesn't get lost ──────────
      - name: Open issue on failure
        if: failure() && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.existsSync('e2e-output.txt')
              ? fs.readFileSync('e2e-output.txt', 'utf8').slice(-3000)
              : '(no output captured)';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `🚨 E2E Smoke Test Failed – ${context.sha.slice(0,7)}`,
              body: [
                `**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                `**Commit:** ${context.sha}`,
                `**Branch:** ${context.ref}`,
                '',
                '### Last 3000 chars of test output',
                '```',
                output,
                '```',
              ].join('\n'),
              labels: ['bug', 'e2e', 'urgent'],
            });

  # ── Summary job so branch protection can key off a single check ────────
  e2e-result:
    name: E2E result
    runs-on: ubuntu-latest
    needs: [preflight, e2e]
    if: always()
    steps:
      - name: Report
        run: |
          if [ "${{ needs.e2e.result }}" = "success" ]; then
            echo "✅ E2E smoke test passed"
          else
            echo "❌ E2E smoke test failed (preflight=${{ needs.preflight.result }}, e2e=${{ needs.e2e.result }})"
            exit 1
          fi
