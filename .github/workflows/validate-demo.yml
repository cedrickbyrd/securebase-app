name: Validate Demo Environment

on:
  # Run after demo deployment completes
  # FIXED: was "Deploy to Netlify" — actual name in deploy-demo.yml is "Deploy Demo Portal (Netlify)"
  workflow_run:
    workflows: ["Deploy Demo Portal (Netlify)"]
    types:
      - completed

  # Manual trigger
  workflow_dispatch:

  # Daily health check at 9 AM UTC
  schedule:
    - cron: '0 9 * * *'

jobs:
  validate-demo:
    name: Validate demo.securebase.tximhotep.com
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for Netlify propagation
        # FIXED: 10s is too short for Netlify CDN propagation — increased to 60s
        if: github.event_name == 'workflow_run'
        run: |
          echo "⏳ Waiting 60s for Netlify CDN to propagate..."
          sleep 60

      - name: Check site accessibility
        id: accessibility
        run: |
          echo "🔍 Checking demo site accessibility..."
          SITE="https://demo.securebase.tximhotep.com/"

          response_code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$SITE")
          if [ "$response_code" -eq 200 ]; then
            echo "✅ Site is accessible (HTTP $response_code)"
            echo "accessible=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Site returned HTTP $response_code"
            echo "accessible=false" >> $GITHUB_OUTPUT
            exit 1
          fi

          # Check HTTPS redirect
          http_redirect=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 http://demo.securebase.tximhotep.com/)
          if [ "$http_redirect" -eq 301 ] || [ "$http_redirect" -eq 308 ]; then
            echo "✅ HTTP → HTTPS redirect works (HTTP $http_redirect)"
          else
            echo "⚠️ HTTP redirect returned $http_redirect (expected 301 or 308)"
          fi

      - name: Validate security headers
        id: headers
        run: |
          echo "🔒 Validating security headers..."
          SITE="https://demo.securebase.tximhotep.com/"
          headers=$(curl -sI --max-time 15 "$SITE")
          FAILED=0

          check_header() {
            local label="$1"
            local pattern="$2"
            local required="$3"
            if echo "$headers" | grep -qi "$pattern"; then
              echo "✅ $label present"
            elif [ "$required" = "required" ]; then
              echo "❌ Missing $label"
              FAILED=1
            else
              echo "⚠️ Missing $label (recommended)"
            fi
          }

          check_header "Content-Security-Policy"   "Content-Security-Policy"         required
          check_header "X-Frame-Options: DENY"     "X-Frame-Options.*DENY"           required
          check_header "X-Content-Type-Options"    "X-Content-Type-Options.*nosniff" required
          check_header "Strict-Transport-Security" "Strict-Transport-Security"       required
          check_header "X-Environment: demo"       "X-Environment.*demo"             optional
          check_header "X-Robots-Tag: noindex"     "X-Robots-Tag.*noindex"           optional
          check_header "Referrer-Policy"           "Referrer-Policy"                 optional
          check_header "Permissions-Policy"        "Permissions-Policy"              optional

          if [ "$FAILED" -eq 1 ]; then
            echo "headers=fail" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "headers=pass" >> $GITHUB_OUTPUT

      - name: Check security.txt
        run: |
          echo "📄 Checking security.txt..."
          response=$(curl -s --max-time 10 https://demo.securebase.tximhotep.com/.well-known/security.txt)

          if [ -z "$response" ]; then
            echo "❌ security.txt not found"
            exit 1
          fi

          echo "$response" | grep -qi "Contact:" && echo "✅ Contact present" || { echo "❌ Missing Contact"; exit 1; }

          if echo "$response" | grep -qi "Expires:"; then
            echo "✅ Expires present"
            expiry_date=$(echo "$response" | grep -i "Expires:" | head -n1 | sed 's/Expires: //' | tr -d '\r')
            expiry_epoch=$(date -d "$expiry_date" +%s 2>/dev/null || echo "0")
            current_epoch=$(date +%s)
            if [ "$expiry_epoch" -gt "$current_epoch" ]; then
              echo "✅ security.txt not expired (expires: $expiry_date)"
            else
              echo "⚠️ security.txt may be expired: $expiry_date"
            fi
          else
            echo "⚠️ Missing Expires field"
          fi

      - name: Verify demo auth JWT endpoint
        # Confirms the AWS Lambda demo-auth endpoint is reachable and returns a
        # JWT token in the response body when presented with valid demo credentials.
        # The token value is never printed — only its presence is checked.
        run: |
          echo "🔐 Verifying demo auth JWT endpoint..."
          SITE="https://demo.securebase.tximhotep.com"
          FAILED=0

          response=$(curl -si --max-time 15 \
            -X POST "${SITE}/api/demo-auth" \
            -H "Content-Type: application/json" \
            -d '{"action":"login","email":"admin@healthcorp.example.com","password":"demo-healthcare-2026"}')

          http_code=$(echo "$response" | grep -i "^HTTP" | tail -1 | awk '{print $2}')
          body=$(echo "$response" | tail -1)

          if [ "$http_code" = "200" ]; then
            echo "✅ demo-auth endpoint returned HTTP 200"
          else
            echo "❌ demo-auth returned HTTP $http_code (expected 200)"
            FAILED=1
          fi

          if echo "$body" | grep -q '"token"'; then
            echo "✅ JWT token present in response body"
          else
            echo "❌ JWT token missing from response body"
            FAILED=1
          fi

          if echo "$body" | grep -q '"customer"'; then
            echo "✅ Customer object present in response body"
          else
            echo "❌ Customer object missing from response body"
            FAILED=1
          fi

          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi

      - name: Verify isEnterprise flag in token response
        run: |
          echo "🏢 Verifying isEnterprise flag in demo-auth response..."
          SITE="https://demo.securebase.tximhotep.com"
          FAILED=0

          response=$(curl -si --max-time 15 \
            -X POST "${SITE}/api/demo-auth" \
            -H "Content-Type: application/json" \
            -d '{"action":"login","email":"admin@healthcorp.example.com","password":"demo-healthcare-2026"}')

          body=$(echo "$response" | tail -1)

          if echo "$body" | grep -q '"isEnterprise"'; then
            echo "✅ isEnterprise flag present in response body"
          else
            echo "❌ isEnterprise flag missing from response body"
            FAILED=1
          fi

          # For healthcare tier, isEnterprise must be true
          if echo "$body" | python3 -c "import sys,json; d=json.load(sys.stdin); sys.exit(0 if d.get('customer',{}).get('isEnterprise') == True else 1)" 2>/dev/null; then
            echo "✅ isEnterprise=true for healthcare (enterprise) tier"
          else
            echo "❌ isEnterprise is not true for healthcare tier"
            FAILED=1
          fi

          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi

      - name: Verify JWT header uses RS256 (KMS signing)
        run: |
          echo "🔑 Verifying JWT is signed with RS256 (KMS)..."
          SITE="https://demo.securebase.tximhotep.com"
          FAILED=0

          response=$(curl -si --max-time 15 \
            -X POST "${SITE}/api/demo-auth" \
            -H "Content-Type: application/json" \
            -d '{"action":"login","email":"admin@healthcorp.example.com","password":"demo-healthcare-2026"}')

          body=$(echo "$response" | tail -1)

          # Extract the token value from the JSON body
          token=$(echo "$body" | python3 -c "import sys,json; print(json.load(sys.stdin).get('token',''))" 2>/dev/null || echo "")

          if [ -z "$token" ]; then
            echo "❌ Could not extract token from response body"
            exit 1
          fi

          # Decode the JWT header (first segment)
          header_b64=$(echo "$token" | cut -d'.' -f1)
          # Add padding and decode
          header_json=$(python3 -c "
          import base64, sys
          s = sys.argv[1]
          s += '=' * (4 - len(s) % 4)
          print(base64.urlsafe_b64decode(s).decode())
          " "$header_b64" 2>/dev/null || echo "")

          echo "JWT header: $header_json"

          if echo "$header_json" | grep -q '"RS256"'; then
            echo "✅ JWT is signed with RS256 (KMS)"
          else
            echo "❌ JWT alg is not RS256 — KMS signing may not be active"
            FAILED=1
          fi

          if echo "$header_json" | grep -q '"HS256"'; then
            echo "❌ JWT is using HS256 (HMAC fallback) — KMS_KEY_ID env var may not be set on Lambda"
            FAILED=1
          fi

          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Playwright
        run: |
          npm install -D @playwright/test
          npx playwright install chromium --with-deps

      - name: Test demo login flow
        # FIXED: proper Playwright test assertions — old code used `if (loginForm)` which
        # is always truthy because Playwright Locator objects are never null
        run: |
          cat > test-demo.spec.js << 'EOF'
          const { test, expect } = require('@playwright/test');

          test('demo site loads and shows login form', async ({ page }) => {
            await page.goto('https://demo.securebase.tximhotep.com/', { timeout: 30000 });
            await expect(page).toHaveTitle(/.+/);

            const emailInput = page.locator('input[type="email"], input[type="text"]').first();
            await expect(emailInput).toBeVisible({ timeout: 5000 });

            await page.screenshot({ path: 'demo-homepage.png', fullPage: true });
          });

          test('demo mode indicator is present', async ({ page }) => {
            await page.goto('https://demo.securebase.tximhotep.com/', { timeout: 30000 });
            const body = await page.content();
            const isDemoMode = body.includes('demo') || body.includes('Demo') || body.includes('DEMO');
            if (!isDemoMode) {
              console.warn('⚠️ No demo indicator found — verify VITE_DEMO_MODE=true is set');
            }
          });
          EOF

          npx playwright test test-demo.spec.js --reporter=line

      - name: Run Lighthouse audit
        uses: treosh/lighthouse-ci-action@v11
        continue-on-error: true
        with:
          urls: 'https://demo.securebase.tximhotep.com/'
          budgetPath: ./bot-budgets.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Create job summary
        if: always()
        run: |
          echo "## 🎯 Demo Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Site Accessibility | ${{ steps.accessibility.outputs.accessible == 'true' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Headers   | ${{ steps.headers.outputs.headers == 'pass' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Playwright Login   | ${{ job.status == 'success' && '✅ Pass' || '⚠️ See logs' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** demo.securebase.tximhotep.com" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4.4.3
        with:
          name: demo-screenshots
          path: demo-homepage.png
          retention-days: 7

  notify-on-failure:
    name: Notify on validation failure
    runs-on: ubuntu-latest
    needs: validate-demo
    if: failure() && github.event_name == 'schedule'
    permissions:
      issues: write

    steps:
      - name: Check for existing open failure issue
        # ROOT CAUSE FIX: previous code created a brand-new issue every day.
        # This step checks if an open issue already exists before creating another.
        id: check-issue
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'demo,bug,urgent',
              per_page: 10,
            });
            const existing = issues.data.find(i => i.title.includes('Demo Environment Validation Failed'));
            if (existing) {
              console.log(`Open issue already exists: #${existing.number} — skipping creation`);
              core.setOutput('exists', 'true');
              core.setOutput('issue_number', String(existing.number));
            } else {
              core.setOutput('exists', 'false');
            }

      - name: Add comment to existing issue
        if: steps.check-issue.outputs.exists == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt('${{ steps.check-issue.outputs.issue_number }}'),
              body: `🔁 **Still failing** as of ${new Date().toISOString().split('T')[0]}\n\n` +
                    `**Workflow Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });

      - name: Create new issue (only if none exists)
        if: steps.check-issue.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Demo Environment Validation Failed - ${new Date().toISOString().split('T')[0]}`,
              body: `## Demo Validation Failure\n\n` +
                `The automated validation of \`demo.securebase.tximhotep.com\` has failed.\n\n` +
                `**Workflow Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n` +
                `**Timestamp:** ${new Date().toISOString()}\n\n` +
                `Please investigate and resolve the issue.\n\n` +
                `> ℹ️ While this issue remains open, subsequent daily failures will add comments here rather than creating new issues.`,
              labels: ['demo', 'bug', 'urgent']
            });
