name: Deploy Demo Portal (Netlify)

on:
  push:
    branches:
      - main
    paths:
      - 'phase3a-portal/**'
      - '.github/workflows/deploy-demo.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'phase3a-portal/**'
  workflow_dispatch:

jobs:
  deploy-demo-portal:
    name: Deploy to Netlify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      deployments: write
    defaults:
      run:
        working-directory: phase3a-portal
    outputs:
      deployment-url: ${{ steps.netlify-deploy.outputs.deploy-url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Validate Pilot Pricing ($2,000)
        working-directory: .
        run: node .github/scripts/validate-pricing.js standard

      - name: Build demo portal
        run: npm run build
        env:
          VITE_USE_MOCK_API: false
          VITE_ENV: production
          VITE_ANALYTICS_ENABLED: true
          VITE_STRIPE_PUBLIC_KEY: ${{ secrets.STRIPE_PUBLIC_KEY }}

      - name: Copy demo data
        run: |
          if [ -f demo-data.json ]; then
            cp demo-data.json dist/demo-data.json
            echo "✅ Demo data copied to dist/"
          else
            echo "⚠️ demo-data.json not found, skipping"
          fi

      - name: Deploy to Netlify
        id: netlify-deploy
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: './phase3a-portal/dist'
          production-branch: main
          production-deploy: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Demo  - ${{ github.event.head_commit.message || 'Manual Deploy' }}"
          enable-pull-request-comment: true
          enable-commit-comment: false
          overwrites-pull-request-comment: true
          alias: ${{ github.event_name == 'pull_request' && format('demo-pr-{0}', github.event.number) || '' }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_DEMO_SITE_ID }}
        timeout-minutes: 8

      - name: Update deployment summary
        run: |
          echo "### 🎯 Demo Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: ${{ steps.netlify-deploy.outputs.deploy-url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ✅ Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'Production' || 'Preview' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

  verify-demo:
    name: Verify Netlify Deployment
    needs: deploy-demo-portal
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Wait for deployment propagation
        run: sleep 15

      - name: Test Netlify deployment
        run: |
          DEPLOY_URL="${{ needs.deploy-demo-portal.outputs.deployment-url }}"
          echo "🧪 Testing $DEPLOY_URL..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_URL")

          if [ "$STATUS" -eq 200 ]; then
            echo "✅ Demo is accessible (HTTP $STATUS)"
          else
            echo "❌ Demo returned HTTP $STATUS"
            exit 1
          fi

      - name: Smoke test demo-auth endpoint
        run: |
          DEPLOY_URL="${{ needs.deploy-demo-portal.outputs.deployment-url }}"
          echo "🔐 Smoke-testing POST ${DEPLOY_URL}/api/demo-auth ..."

          response=$(curl -si --max-time 15 \
            -X POST "${DEPLOY_URL}/api/demo-auth" \
            -H "Content-Type: application/json" \
            -d '{"action":"login","email":"demo@securebase.tximhotep.com","password":"SecureBaseDemo2026!"}')

          http_code=$(echo "$response" | grep -i "^HTTP" | tail -1 | awk '{print $2}')
          body=$(echo "$response" | tail -1)

          if [ "$http_code" != "200" ]; then
            echo "❌ demo-auth returned HTTP $http_code (expected 200)"
            echo "Body: $body"
            exit 1
          fi
          echo "✅ demo-auth returned HTTP 200"

          if ! echo "$body" | grep -q '"token"'; then
            echo "❌ JWT token missing from response body"
            exit 1
          fi
          echo "✅ JWT token present in response"

          if ! echo "$body" | grep -q '"customer"'; then
            echo "❌ Customer object missing from response body"
            exit 1
          fi
          echo "✅ Customer object present in response"

      - name: Generate deployment report
        if: always()
        run: |
          echo "## 📊 Demo Deployment Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          DEPLOY_URL="${{ needs.deploy-demo-portal.outputs.deployment-url }}"
          DEMO_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_URL")
          if [ "$DEMO_STATUS" -eq 200 ]; then
            echo "- ✅ **Demo **: $DEPLOY_URL (HTTP $DEMO_STATUS)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ **Demo **: $DEPLOY_URL (HTTP $DEMO_STATUS)" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment Time**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
