name: Deploy Checkout Lambda

# Packages and deploys the create-checkout-session Lambda (securebase-checkout-api)
# to AWS whenever the function source changes on main, or on manual trigger.
#
# The Lambda source lives at:
#   src/functions/securebase-checkout-api/index.cjs
#
# The deployed function name is: create-checkout-session
# API Gateway: 4f0i48ueak (us-east-1) — POST /checkout

on:
  push:
    branches:
      - main
    paths:
      - 'src/functions/securebase-checkout-api/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - production
        default: production

permissions:
  contents: read
  id-token: write   # Required for AWS OIDC auth

env:
  AWS_REGION: us-east-1
  LAMBDA_FUNCTION_NAME: create-checkout-session
  LAMBDA_SOURCE_DIR: src/functions/securebase-checkout-api
  ZIP_PATH: /tmp/checkout.zip

jobs:
  package_and_deploy:
    name: Package and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package Lambda
        run: |
          echo "Packaging Lambda from $LAMBDA_SOURCE_DIR ..."
          cd "$LAMBDA_SOURCE_DIR"
          zip -r "$ZIP_PATH" .
          echo "Package SHA256: $(sha256sum "$ZIP_PATH" | awk '{print $1}')"

      - name: Deploy Lambda code
        run: |
          echo "Deploying to $LAMBDA_FUNCTION_NAME ..."
          aws lambda update-function-code \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --zip-file "fileb://$ZIP_PATH" \
            --region "$AWS_REGION" \
            --query 'FunctionArn' \
            --output text

          echo "Waiting for Lambda update to complete..."
          aws lambda wait function-updated \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --region "$AWS_REGION"
          echo "✅ Lambda deployed"

      - name: Verify deployment
        run: |
          echo "Lambda configuration after deploy:"
          aws lambda get-function-configuration \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --region "$AWS_REGION" \
            --query '{Runtime: Runtime, Handler: Handler, LastModified: LastModified}' \
            --output table

      - name: Smoke test — verify handler_version log
        run: |
          echo "Invoking Lambda with minimal test payload..."
          aws lambda invoke \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --region "$AWS_REGION" \
            --payload '{"httpMethod":"POST","body":"{\"priceId\":\"price_test\",\"tier\":\"pilot_compliance\",\"billingType\":\"payment\"}"}' \
            --log-type Tail \
            --query 'LogResult' \
            --output text \
            /tmp/lambda-response.json | base64 --decode > /tmp/lambda-logs.txt

          echo "=== CloudWatch log tail ==="
          cat /tmp/lambda-logs.txt

          echo "=== Response body ==="
          cat /tmp/lambda-response.json | python3 -m json.tool 2>/dev/null || cat /tmp/lambda-response.json

          # Verify the new handler version is running
          if grep -q "handler_version=2026-04-19" /tmp/lambda-logs.txt; then
            echo "✅ handler_version=2026-04-19 confirmed in logs"
          else
            echo "❌ handler_version not found — check CloudWatch logs for /aws/lambda/$LAMBDA_FUNCTION_NAME"
            exit 1
          fi
