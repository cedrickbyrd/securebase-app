name: Deploy Checkout Lambda

on:
  push:
    branches: [main]
    paths:
      - 'src/functions/securebase-checkout-api/**'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deploy even if no code changes (type FORCE)'
        required: false
        type: string

permissions:
  contents: read
  actions: write

env:
  FUNCTION_NAME: securebase-checkout-api
  REST_API_ID: 4f0i48ueak
  STAGE_NAME: prod
  CHECKOUT_RESOURCE_ID: 0zibo7

jobs:
  deploy-lambda:
    name: 'Deploy · Checkout Lambda'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install production dependencies
        run: |
          npm install --prefix src/functions/securebase-checkout-api stripe --omit=dev --no-save
          echo "stripe installed"

      - name: Verify handler version tag present
        run: |
          if ! grep -q "handler_version=" src/functions/securebase-checkout-api/index.cjs; then
            echo "::error::handler_version tag missing from index.cjs — refusing to deploy unversioned code"
            exit 1
          fi
          VERSION=$(grep -o 'handler_version=[^[:space:]]*' src/functions/securebase-checkout-api/index.cjs | head -1)
          echo "Deploying ${VERSION}"
          echo "handler_version=${VERSION}" >> "$GITHUB_ENV"

      - name: Package Lambda zip
        run: |
          cd src/functions/securebase-checkout-api
          zip -r ../../../lambda-checkout.zip index.cjs node_modules/
          echo "Package size: $(du -sh ../../../lambda-checkout.zip | cut -f1)"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name "$FUNCTION_NAME" \
            --zip-file fileb://lambda-checkout.zip
          echo "Lambda code updated"
          aws lambda wait function-updated \
            --function-name "$FUNCTION_NAME"
          echo "Lambda update complete"

      - name: Verify $LATEST
        id: verify_latest
        run: |
          VERSION=$(aws lambda get-function-configuration \
            --function-name "$FUNCTION_NAME" \
            --query 'Version' \
            --output text)
          echo "Lambda Version: ${VERSION}"
          if [ "$VERSION" != '$LATEST' ]; then
            echo "verify_latest=FAIL" >> "$GITHUB_ENV"
            echo "::error::Lambda is not at \$LATEST (got '${VERSION}'). Ensure update-function-code targets the unpublished \$LATEST alias."
            exit 1
          fi
          echo "verify_latest=PASS" >> "$GITHUB_ENV"
          echo "Lambda is at \$LATEST"

      - name: Verify environment variables
        id: verify_env_vars
        run: |
          REQUIRED_VARS=(
            STRIPE_PRICE_STANDARD
            STRIPE_PRICE_FINTECH
            STRIPE_PRICE_HEALTHCARE
            STRIPE_PRICE_GOVERNMENT
            STRIPE_PRICE_PILOT_COMPLIANCE
            STRIPE_PRICE_HIPAA_ASSESSMENT
            STRIPE_PILOT_COUPON_ID
            STRIPE_SECRET_KEY
          )

          ENV_JSON=$(aws lambda get-function-configuration \
            --function-name "$FUNCTION_NAME" \
            --query 'Environment.Variables' \
            --output json)
          echo "Lambda environment variables retrieved"

          MISSING=()
          for VAR in "${REQUIRED_VARS[@]}"; do
            VALUE=$(echo "$ENV_JSON" | jq -r --arg key "$VAR" '.[$key] // empty')
            if [ -z "$VALUE" ]; then
              MISSING+=("$VAR")
            fi
          done

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "verify_env_vars=FAIL" >> "$GITHUB_ENV"
            echo "missing_vars=${MISSING[*]}" >> "$GITHUB_ENV"
            echo "::error::Missing required Lambda environment variables: ${MISSING[*]}"
            exit 1
          fi

          echo "verify_env_vars=PASS" >> "$GITHUB_ENV"
          echo "All required environment variables are set"

      - name: Verify API Gateway integration
        id: verify_apigw
        run: |
          INTEGRATION_URI=$(aws apigateway get-integration \
            --rest-api-id "$REST_API_ID" \
            --resource-id "$CHECKOUT_RESOURCE_ID" \
            --http-method POST \
            --query 'uri' \
            --output text)
          echo "Current integration URI: ${INTEGRATION_URI}"

          REDEPLOYED=false
          NEEDS_EXIT=false

          # Check if URI references the correct function
          if [[ "$INTEGRATION_URI" != *"$FUNCTION_NAME"* ]]; then
            echo "::error::API Gateway POST /checkout does not point to '${FUNCTION_NAME}'. Current URI: ${INTEGRATION_URI}"
            echo "Auto-fixing integration URI..."
            CORRECT_URI="arn:aws:apigateway:${{ secrets.AWS_REGION }}:lambda:path/2015-03-31/functions/arn:aws:lambda:${{ secrets.AWS_REGION }}:${{ secrets.AWS_ACCOUNT_ID }}:function:${FUNCTION_NAME}/invocations"
            aws apigateway put-integration \
              --rest-api-id "$REST_API_ID" \
              --resource-id "$CHECKOUT_RESOURCE_ID" \
              --http-method POST \
              --type AWS_PROXY \
              --integration-http-method POST \
              --uri "$CORRECT_URI"
            echo "Integration URI corrected"
            REDEPLOYED=true
            NEEDS_EXIT=true
          fi

          # Check if URI has a version qualifier (e.g. :123/invocations)
          if [[ "$INTEGRATION_URI" =~ :[0-9]+/invocations$ ]]; then
            echo "::warning::API Gateway integration URI contains a version qualifier. Auto-fixing to \$LATEST..."
            FIXED_URI=$(echo "$INTEGRATION_URI" | sed 's/:[0-9][0-9]*\/invocations$/\/invocations/')
            aws apigateway put-integration \
              --rest-api-id "$REST_API_ID" \
              --resource-id "$CHECKOUT_RESOURCE_ID" \
              --http-method POST \
              --type AWS_PROXY \
              --integration-http-method POST \
              --uri "$FIXED_URI"
            echo "Version qualifier removed from integration URI"
            REDEPLOYED=true
          fi

          # Redeploy if any fix was applied
          if [ "$REDEPLOYED" = "true" ]; then
            echo "Redeploying API Gateway stage '${STAGE_NAME}'..."
            aws apigateway create-deployment \
              --rest-api-id "$REST_API_ID" \
              --stage-name "$STAGE_NAME" \
              --description "Auto-fix: corrected checkout Lambda integration URI"
            echo "API Gateway redeployed"
          fi

          if [ "$NEEDS_EXIT" = "true" ]; then
            echo "verify_apigw=FAIL (auto-fixed)" >> "$GITHUB_ENV"
            echo "::error::API Gateway integration was incorrect and has been auto-fixed. Review the integration and re-run this workflow."
            exit 1
          fi

          echo "verify_apigw=PASS" >> "$GITHUB_ENV"
          echo "API Gateway integration URI is correct"

      - name: Smoke test checkout endpoint
        id: smoke_test
        run: |
          BASE_URL="https://securebase.tximhotep.com/api/checkout"
          TIERS=(standard fintech pilot_compliance hipaa_assessment)
          FAILED=()

          for TIER in "${TIERS[@]}"; do
            echo "--- Smoke test: tier=${TIER} ---"
            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$BASE_URL" \
              -H "Content-Type: application/json" \
              -d "{\"plan\":\"${TIER}\",\"company_name\":\"CI Smoke Test\",\"hipaa_baa_acknowledged\":true}" \
              --max-time 30)

            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -n -1)

            echo "Tier '${TIER}': HTTP ${HTTP_CODE}"
            echo "Response body (truncated): ${BODY:0:300}"

            if echo "$BODY" | grep -q "tier is required"; then
              echo "::error::Smoke test FAILED for tier '${TIER}': response contains 'tier is required'"
              FAILED+=("$TIER")
            fi
          done

          if [ ${#FAILED[@]} -gt 0 ]; then
            echo "smoke_test=FAIL (${FAILED[*]})" >> "$GITHUB_ENV"
            echo "::error::Smoke test failed for tiers: ${FAILED[*]}"
            exit 1
          fi

          echo "smoke_test=PASS" >> "$GITHUB_ENV"
          echo "All smoke tests passed"

      - name: Verify deployed version
        run: |
          DEPLOYED=$(aws lambda get-function-configuration \
            --function-name "$FUNCTION_NAME" \
            --query 'LastModified' \
            --output text)
          echo "Lambda last modified: ${DEPLOYED}"

          QUALIFIER=$(aws lambda get-function-configuration \
            --function-name "$FUNCTION_NAME" \
            --query 'FunctionArn' \
            --output text | grep -oP ':\d+$' || echo "none")
          if [ "$QUALIFIER" != "none" ] && [ -n "$QUALIFIER" ]; then
            echo "::warning::Lambda ARN has version qualifier ${QUALIFIER} — API Gateway may be pinned to an old version"
          else
            echo "Lambda is not pinned to a specific version"
          fi

      - name: Trigger validate-checkout-path workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run validate-checkout-path.yml --ref main
          echo "Triggered validate-checkout-path workflow"

      - name: Upload Lambda zip as artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-checkout-${{ env.handler_version }}
          path: lambda-checkout.zip
          retention-days: 7

      - name: Write job summary
        if: always()
        run: |
          echo "# Checkout Lambda Deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Handler version | \`${{ env.handler_version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Function | \`${FUNCTION_NAME}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Triggered by | \`${{ github.event_name }}\` on \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Integration Check Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Verify \$LATEST | ${verify_latest:-SKIPPED} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Verify env vars | ${verify_env_vars:-SKIPPED} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Verify API Gateway integration | ${verify_apigw:-SKIPPED} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Smoke test (4 tiers) | ${smoke_test:-SKIPPED} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "validate-checkout-path triggered — check Actions tab for Hop 5 result." >> "$GITHUB_STEP_SUMMARY"
