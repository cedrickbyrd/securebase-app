# This file configures the deployment to AWS Lambda

name: Deploy Workflow

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code --function-name securebase-checkout-api --zip-file fileb://function.zip

      - name: Verify deployed version
        run: |
          aws lambda get-function --function-name securebase-checkout-api

      - name: Write job summary
        run: |
          echo "Deployed securebase-checkout-api successfully!"