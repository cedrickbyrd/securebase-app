name: SecureBase Dependency Security

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 1'

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  analyze-dependencies:
    name: Dependency Security Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        if: github.event_name == 'pull_request'
        # NOTE: Requires Dependency Graph to be enabled manually in repository settings:
        # Settings → Security & Analysis → Dependency graph → Enable
        # Until enabled, this step is allowed to fail without blocking the workflow.
        continue-on-error: true
        with:
          fail-on-severity: moderate
          deny-licenses: GPL-3.0, AGPL-3.0
          comment-summary-in-pr: true
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Weekly dependency audit (root)
        if: github.event_name == 'schedule'
        run: |
          npm audit --json > audit-results.json || true
          
          high_vulns=$(cat audit-results.json | jq '.metadata.vulnerabilities.high // 0')
          critical_vulns=$(cat audit-results.json | jq '.metadata.vulnerabilities.critical // 0')
          
          echo "Root - Critical: $critical_vulns, High: $high_vulns"
          echo "ROOT_HIGH=$high_vulns" >> $GITHUB_ENV
          echo "ROOT_CRITICAL=$critical_vulns" >> $GITHUB_ENV

      - name: Weekly dependency audit (portal)
        if: github.event_name == 'schedule'
        working-directory: phase3a-portal
        run: |
          npm audit --json > ../audit-results-portal.json || true
          
          high_vulns=$(cat ../audit-results-portal.json | jq '.metadata.vulnerabilities.high // 0')
          critical_vulns=$(cat ../audit-results-portal.json | jq '.metadata.vulnerabilities.critical // 0')
          
          echo "Portal - Critical: $critical_vulns, High: $high_vulns"
          echo "PORTAL_HIGH=$high_vulns" >> $GITHUB_ENV
          echo "PORTAL_CRITICAL=$critical_vulns" >> $GITHUB_ENV

      - name: Evaluate combined audit results
        if: github.event_name == 'schedule'
        run: |
          total_high=$(( ${ROOT_HIGH:-0} + ${PORTAL_HIGH:-0} ))
          total_critical=$(( ${ROOT_CRITICAL:-0} + ${PORTAL_CRITICAL:-0} ))
          
          echo "Combined - Critical: $total_critical, High: $total_high"
          
          if [ $total_critical -gt 0 ] || [ $total_high -gt 0 ]; then
            echo "SECURITY_ALERT=true" >> $GITHUB_ENV
          else
            echo "SECURITY_ALERT=false" >> $GITHUB_ENV
          fi

      - name: Create or update security alert issue
        if: github.event_name == 'schedule' && env.SECURITY_ALERT == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security,dependencies',
              per_page: 50,
            });

            const ALERT_TITLE = '[SECURITY] Dependency Vulnerabilities Detected';
            const existing = openIssues.find(i => i.title === ALERT_TITLE);

            if (existing) {
              console.log(`Open security issue #${existing.number} already exists - skipping duplicate creation.`);
              return;
            }

            const alertMessage =
              `## SecureBase Dependency Security Alert\n\n` +
              `The weekly dependency audit has identified security vulnerabilities ` +
              `that require attention.\n\n` +
              `Run the following commands locally to review and address:\n\n` +
              `\`\`\`bash\n` +
              `# Root package\nnpm audit\n\n` +
              `# Portal package\ncd phase3a-portal && npm audit\n` +
              `\`\`\`\n\n` +
              `**Date:** ${new Date().toISOString().split('T')[0]}`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: ALERT_TITLE,
              body: alertMessage,
              labels: ['security', 'dependencies'],
            });

      - name: Close resolved security alert issues
        if: github.event_name == 'schedule' && env.SECURITY_ALERT == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security,dependencies',
              per_page: 50,
            });

            const ALERT_TITLE = '[SECURITY] Dependency Vulnerabilities Detected';
            const toClose = openIssues.filter(i => i.title === ALERT_TITLE);

            for (const issue of toClose) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `✅ The weekly dependency audit found no high or critical vulnerabilities as of ${new Date().toISOString().split('T')[0]}. Closing this issue automatically.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed',
              });
              console.log(`Closed resolved security issue #${issue.number}`);
            }
