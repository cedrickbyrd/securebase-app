name: Test Live Demo

on:
  # Run only after a SUCCESSFUL demo deployment
  workflow_run:
    workflows: ["Deploy Phase 3A Demo"]   # must match name: field in deploy-phase3a-demo.yml
    types:
      - completed
    branches:
      - main

  # Manual trigger
  workflow_dispatch:
    inputs:
      demo_url:
        description: "Demo URL to test (must start with http:// or https://)"
        required: false
        default: "http://securebase-phase3a-demo.s3-website-us-east-1.amazonaws.com"

  # Daily health-check (8 AM UTC)
  schedule:
    - cron: "0 8 * * *"

# ── Shared env ──────────────────────────────────────────────────────────────
env:
  # Resolved once; all jobs reference this variable.
  # workflow_dispatch input takes priority; falls back to the known S3 URL.
  DEMO_URL: ${{ github.event.inputs.demo_url || 'http://securebase-phase3a-demo.s3-website-us-east-1.amazonaws.com' }}

# ── Default permissions (least-privilege) ───────────────────────────────────
permissions:
  contents: read
  actions: read

jobs:

  # ── Guard: skip entire run when triggered by a failed deploy ──────────────
  preflight:
    name: Preflight Check
    runs-on: ubuntu-latest
    # On workflow_run events, only proceed when the triggering run succeeded.
    # Manual and scheduled triggers always pass this gate.
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Validate DEMO_URL format
        run: |
          URL="${{ env.DEMO_URL }}"
          if [[ ! "$URL" =~ ^https?:// ]]; then
            echo "::error::DEMO_URL must start with http:// or https://. Got: $URL"
            exit 1
          fi
          echo "✅ DEMO_URL is valid: $URL"

  # ── Smoke tests ───────────────────────────────────────────────────────────
  smoke-tests:
    name: Run Smoke Tests
    runs-on: ubuntu-latest
    needs: [preflight]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run smoke test script
        working-directory: phase3a-portal
        env:
          DEMO_URL: ${{ env.DEMO_URL }}
        run: |
          chmod +x test-demo-live.sh
          ./test-demo-live.sh

      - name: Upload smoke test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: phase3a-portal/smoke-test-*.log
          retention-days: 7
          if-no-files-found: ignore

  # ── E2E tests (Playwright) ────────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: [preflight]

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # package.json engines field requires node >=20.19.0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: phase3a-portal/package-lock.json

      # Use npm ci only — lockfile drift must be fixed, not silently bypassed
      - name: Install dependencies
        working-directory: phase3a-portal
        run: npm ci

      - name: Install Playwright browser
        working-directory: phase3a-portal
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run Playwright E2E tests
        working-directory: phase3a-portal
        env:
          DEMO_URL: ${{ env.DEMO_URL }}
        run: npx playwright test --project=${{ matrix.browser }}

      # Upload test results (traces, screenshots, videos on failure)
      - name: Upload Playwright results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ matrix.browser }}
          path: phase3a-portal/test-results/
          retention-days: 7
          if-no-files-found: ignore

      # Upload HTML report (separate path, no duplication)
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: phase3a-portal/playwright-report/
          retention-days: 7
          if-no-files-found: ignore

  # ── Deployment validation (runs after both smoke + e2e) ───────────────────
  validate-deployment:
    name: Validate Demo Deployment
    runs-on: ubuntu-latest
    # Gate on smoke-tests AND e2e-tests so validation reflects a full picture
    needs: [smoke-tests, e2e-tests]
    if: always() && needs.smoke-tests.result != 'cancelled'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run validation script
        working-directory: phase3a-portal
        run: |
          chmod +x test-validation.sh
          ./test-validation.sh

      - name: Check demo accessibility
        env:
          DEMO_URL: ${{ env.DEMO_URL }}
        run: |
          echo "Validating demo environment: $DEMO_URL"
          # S3 static website endpoints serve HTTP only; treat any HTTP 2xx/3xx as accessible
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$DEMO_URL")
          if [[ "$HTTP_STATUS" =~ ^[23][0-9]{2}$ ]]; then
            echo "✅ Demo is accessible (HTTP $HTTP_STATUS)"
          else
            echo "❌ Demo returned HTTP $HTTP_STATUS — not accessible"
            exit 1
          fi

  # ── Summary report ────────────────────────────────────────────────────────
  report-results:
    name: Report Test Results
    runs-on: ubuntu-latest
    needs: [smoke-tests, e2e-tests, validate-deployment]
    if: always()

    steps:
      - name: Generate job summary
        run: |
          {
            echo "# Live Demo Test Results"
            echo ""
            echo "**Demo URL:** \`${{ env.DEMO_URL }}\`"
            echo "**Triggered by:** \`${{ github.event_name }}\`"
            echo "**Run:** [\`${{ github.run_id }}\`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo ""
            echo "| Job | Result |"
            echo "|-----|--------|"

            smoke="${{ needs.smoke-tests.result }}"
            e2e="${{ needs.e2e-tests.result }}"
            val="${{ needs.validate-deployment.result }}"

            [[ "$smoke" == "success" ]] && echo "| Smoke Tests           | ✅ PASSED |" || echo "| Smoke Tests           | ❌ $smoke |"
            [[ "$e2e"   == "success" ]] && echo "| E2E Tests             | ✅ PASSED |" || echo "| E2E Tests             | ❌ $e2e |"
            [[ "$val"   == "success" ]] && echo "| Deployment Validation | ✅ PASSED |" || echo "| Deployment Validation | ❌ $val |"

            echo ""
            echo "## Artifacts"
            echo "- \`smoke-test-results\` — Shell smoke test logs"
            echo "- \`playwright-results-chromium\` / \`playwright-results-firefox\` — Traces & screenshots"
            echo "- \`playwright-report-chromium\` / \`playwright-report-firefox\` — HTML reports"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail pipeline on test failure
        if: >
          needs.smoke-tests.result == 'failure' ||
          needs.e2e-tests.result   == 'failure'
        run: |
          echo "::error::Live demo tests failed. Review artifacts and the summary above."
          exit 1
