[build]
  command = "cd phase3a-portal && npm install --legacy-peer-deps && npm run build:production"
  publish = "phase3a-portal/dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

# 1. AUTH
[[redirects]]
  from = "/api/login"
  to = "https://9xyetu7zq3.execute-api.us-east-1.amazonaws.com/prod/auth/login"
  status = 200
  force = true
  headers = {X-From = "Netlify-SecureBase"}

# 2. CHECKOUT
[[redirects]]
  from = "/api/checkout"
  to = "https://4f0i48ueak.execute-api.us-east-1.amazonaws.com/prod/checkout"
  status = 200
  force = true
  headers = {X-From = "Netlify-SecureBase"}

# 3. SIGNUP / ONBOARDING
[[redirects]]
  from = "/api/signup"
  to = "https://api.securebase.tximhotep.com/signup"
  status = 200
  force = true
  headers = {X-From = "Netlify-SecureBase"}

[[redirects]]
  from = "/api/verify-email"
  to = "https://api.securebase.tximhotep.com/verify-email"
  status = 200
  force = true
  headers = {X-From = "Netlify-SecureBase"}

[[redirects]]
  from = "/api/onboarding/*"
  to = "https://api.securebase.tximhotep.com/onboarding/:splat"
  status = 200
  force = true
  headers = {X-From = "Netlify-SecureBase"}

# 4. SPA FALLBACK
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200