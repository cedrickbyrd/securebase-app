[build]
  # Force Netlify to go into the portal folder to run the build
  command = "cd phase3a-portal && npm install && npm run build"
  # Force Netlify to deploy the dist folder from inside the portal
  publish = "phase3a-portal/dist"

[build.environment]
  NPM_FLAGS = "--legacy-peer-deps"
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

# 1. DOMAIN STEERING
[[redirects]]
  from = "https://securebase-demo.netlify.app/*"
  to = "https://demo.securebase.tximhotep.com/:splat"
  status = 301
  force = true

# 2. AWS S3 PROXY (The "S3 Shield")
[[redirects]]
  from = "/storage/*"
  to = "https://securebase-fe-prod.s3.amazonaws.com/:splat"
  status = 200
  force = true
  
# 3. SPA ROUTING
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "upgrade-insecure-requests; block-all-mixed-content;"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
