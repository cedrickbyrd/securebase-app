[build]
  base = "phase3a-portal"
  command = "npm install --legacy-peer-deps && npm install react-chartjs-2 chart.js --save --legacy-peer-deps && npm run build"
  publish = "dist"
  
[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

[[redirects]]
  from = "/api/*"
  to = "https://nwiy9yvr8d.execute-api.us-east-2.amazonaws.com/prod/:splat"
  status = 200
  force = true
  headers = {X-From = "Netlify"}

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
