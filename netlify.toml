[build]
  base = "phase3a-portal"
  # Go up one level to install root dependencies, then come back and build
  command = "cd .. && npm install --legacy-peer-deps && cd phase3a-portal && npm install react-chartjs-2 chart.js --save --legacy-peer-deps && npm run build"
  publish = "dist"
  
[build.environment]
  NPM_FLAGS = "--legacy-peer-deps"
  NODE_VERSION = "20"
  # Ensure your VITE variables are here if they aren't in the UI
  VITE_USE_MOCK_API = "true" 
# SECURITY & AUTH HEADERS
[[headers]]
  for = "/*"
  [headers.values]
    # Removes the obsolete 'block-all-mixed-content' and hardens the app
    Content-Security-Policy = "upgrade-insecure-requests; frame-ancestors 'none'; object-src 'none';"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Prevents browsers from caching stale JWT/Refresh tokens
    Cache-Control = "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0"
    
[functions]
  # Adjusted to find your .cjs files
  directory = "src/functions"
  node_bundler = "esbuild"

# 1. API PROXY (Highest Priority & Forced)
[[redirects]]
  from = "/api/*"
  to = "https://nwiy9yvr8d.execute-api.us-east-2.amazonaws.com/prod/:splat"
  status = 200
  force = true # Forces bypass of the SPA catch-all
  headers = {X-From = "Netlify"}

# 2. DOMAIN MIGRATION
[[redirects]]
  from = "https://securebase-demo.netlify.app/*"
  to = "https://demo.securebase.tximhotep.com/:splat"
  status = 301
  force = true

# 3. STATIC STORAGE (S3)
[[redirects]]
  from = "/storage/*"
  to = "https://securebase-fe-prod.s3.amazonaws.com/:splat"
  status = 200
  force = true

# 4. SPA CATCH-ALL (Lowest Priority)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
