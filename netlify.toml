[build]
  base = "phase3a-portal"
  command = "npm ci --legacy-peer-deps && npm run build"
  publish = "dist"
  functions = "../netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

# 1. AUTH
[[redirects]]
  from = "/api/login"
  to = "https://9xyetu7zq3.execute-api.us-east-1.amazonaws.com/prod/auth/login"
  status = 200
  force = true
  headers = {X-From = "Netlify-SecureBase"}

# 2. CHECKOUT
[[redirects]]
  from = "/api/checkout"
  to = "https://4f0i48ueak.execute-api.us-east-1.amazonaws.com/prod/checkout"
  status = 200
  force = true
  headers = {X-From = "Netlify-SecureBase"}

# 3. SIGNUP / ONBOARDING
[[redirects]]
  from = "/api/signup"
  to = "https://api.securebase.tximhotep.com/signup"
  status = 200
  force = true
  headers = {X-From = "Netlify-SecureBase"}

[[redirects]]
  from = "/api/verify-email"
  to = "https://api.securebase.tximhotep.com/verify-email"
  status = 200
  force = true
  headers = {X-From = "Netlify-SecureBase"}

[[redirects]]
  from = "/api/onboarding/*"
  to = "https://api.securebase.tximhotep.com/onboarding/:splat"
  status = 200
  force = true
  headers = {X-From = "Netlify-SecureBase"}

# 5. ADMIN METRICS
[[redirects]]
  from = "/admin/metrics"
  to = "/.netlify/functions/get-admin-metrics"
  status = 200
  force = true

[[redirects]]
  from = "/admin/customers"
  to = "/.netlify/functions/get-admin-metrics"
  status = 200
  force = true

[[redirects]]
  from = "/admin/api-performance"
  to = "/.netlify/functions/get-admin-metrics"
  status = 200
  force = true

[[redirects]]
  from = "/admin/infrastructure"
  to = "/.netlify/functions/get-admin-metrics"
  status = 200
  force = true

[[redirects]]
  from = "/admin/security"
  to = "/.netlify/functions/get-admin-metrics"
  status = 200
  force = true

[[redirects]]
  from = "/admin/costs"
  to = "/.netlify/functions/get-admin-metrics"
  status = 200
  force = true

[[redirects]]
  from = "/admin/deployments"
  to = "/.netlify/functions/get-admin-metrics"
  status = 200
  force = true

# 4. SPA FALLBACK
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true

# 6. CSP HEADERS
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com; frame-src 'self' https://js.stripe.com https://hooks.stripe.com; connect-src 'self' https://api.stripe.com https://*.netlify.app https://*.netlify.com; img-src 'self' data: https:; style-src 'self' 'unsafe-inline';"
