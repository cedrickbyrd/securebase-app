[build]
  # Remove the 'base' line if this is at the root, or keep it but change pathing
  command = "cd phase3a-portal && npm install --legacy-peer-deps && npm run build:production"
  publish = "phase3a-portal/dist"
  functions = "netlify/functions" # Now relative to the root

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

[[redirects]]
  from = "/api/*"
  to = "https://nwiy9yvr8d.execute-api.us-east-2.amazonaws.com/prod/:splat"
  status = 200
  force = true
  headers = {X-From = "Netlify"}

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
