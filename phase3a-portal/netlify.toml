  force = true

[[redirects]]
  from = "/api/compliance/export"
  to = "https://api.securebase.tximhotep.com/compliance/export"
  status = 200
  force = true

[[redirects]]
  from = "/api/compliance/export/:job_id"
  to = "https://api.securebase.tximhotep.com/compliance/export/:job_id"
  status = 200
  force = true

[[redirects]]
