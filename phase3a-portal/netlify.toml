[build]
  base = "phase3a-portal"
  command = "npm ci --legacy-peer-deps && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

# API REDIRECTS - Clean, no headers
[[redirects]]
  from = "/api/login"
  to = "https://9xyetu7zq3.execute-api.us-east-1.amazonaws.com/prod/auth/login"
  status = 200
  force = true

[[redirects]]
  from = "/api/checkout"
  to = "https://4f0i48ueak.execute-api.us-east-1.amazonaws.com/prod/checkout"
  status = 200
  force = true

# PILOT ENDPOINTS
[[redirects]]
  from = "/pilot/availability"
  to = "https://api.securebase.tximhotep.com/pilot/availability"
  status = 200
  force = true

[[redirects]]
  from = "/api/validate-session"
  to = "https://api.securebase.tximhotep.com/validate-session"
  status = 200
  force = true

[[redirects]]
  from = "/api/signup"
  to = "https://api.securebase.tximhotep.com/signup"
  status = 200
  force = true

[[redirects]]
  from = "/api/verify-email"
  to = "https://api.securebase.tximhotep.com/verify-email"
  status = 200
  force = true

[[redirects]]
  from = "/api/onboarding/*"
  to = "https://api.securebase.tximhotep.com/onboarding/:splat"
  status = 200
  force = true


[[redirects]]
  from = "/api/demo-auth"
  to = "https://api.securebase.tximhotep.com/demo-auth"
  status = 200
  force = true

# SIGNUP - redirect to main marketing site (single source of truth)
[[redirects]]
  from = "/signup"
  to = "https://securebase.tximhotep.com/pricing"
  status = 301
  force = true

[[redirects]]
  from = "/register"
  to = "https://securebase.tximhotep.com/pricing"
  status = 301
  force = true

