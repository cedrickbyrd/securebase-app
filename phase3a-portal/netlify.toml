[build]
base = "phase3a-portal"
  command = "npm ci --legacy-peer-deps && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

# API REDIRECTS - Clean, no headers
[[redirects]]
  from = "/api/login"
  to = "https://9xyetu7zq3.execute-api.us-east-1.amazonaws.com/prod/auth/login"
  status = 200
  force = true

[[redirects]]
  from = "/api/checkout"
  to = "https://4f0i48ueak.execute-api.us-east-1.amazonaws.com/prod/checkout"
  status = 200
  force = true

[[redirects]]
  from = "/api/signup"
  to = "https://api.securebase.tximhotep.com/signup"
  status = 200
  force = true

[[redirects]]
  from = "/api/verify-email"
  to = "https://api.securebase.tximhotep.com/verify-email"
  status = 200
  force = true

[[redirects]]
  from = "/api/onboarding/*"
  to = "https://api.securebase.tximhotep.com/onboarding/:splat"
  status = 200
  force = true

# ADMIN REDIRECTS
[[redirects]]
  from = "/admin/*"
  to = "/.netlify/functions/get-admin-metrics"
  status = 200
  force = true

# LEAD PREVIEW AUTH - issues a limited-time JWT after Contact Sales form submission
[[redirects]]
  from = "/api/lead-preview-auth"
  to = "/.netlify/functions/lead-preview-auth"
  status = 200
  force = true

# S3 PROXY SHIELD - prevents direct S3 URL exposure (security guardrail)
[[redirects]]
  from = "/storage/*"
  to = "/.netlify/functions/s3-proxy/:splat"
  status = 200
  force = true

# SPA FALLBACK (LAST)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# CSP HEADERS
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com https://www.googletagmanager.com https://www.google-analytics.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' data: https://fonts.gstatic.com;
      img-src 'self' data: https: blob:;
      connect-src 'self' https://api.stripe.com https://*.stripe.com https://*.supabase.co https://*.netlify.app https://*.netlify.com https://www.google-analytics.com https://analytics.google.com;
      frame-src 'self' https://js.stripe.com https://hooks.stripe.com https://checkout.stripe.com;
      frame-ancestors 'none';
      base-uri 'self';
      form-action 'self' https://checkout.stripe.com;
    """
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    X-Environment = "demo"
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/checkout"
  [headers.values]
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com https://*.stripe.com https://www.googletagmanager.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' data: https://fonts.gstatic.com;
      img-src 'self' data: https: blob:;
      connect-src 'self' https://api.stripe.com https://*.stripe.com https://*.netlify.app https://www.google-analytics.com;
      frame-src 'self' https://js.stripe.com https://hooks.stripe.com https://checkout.stripe.com;
      frame-ancestors 'none';
      form-action 'self' https://checkout.stripe.com;
    """
    X-Frame-Options = "DENY"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Environment = "demo"
    X-Robots-Tag = "noindex, nofollow"
