# SRE METRICS API - Phase 5.3
[[redirects]]
  from = "/api/sre/*"
  to = "https://api.securebase.tximhotep.com/sre/:splat"
  status = 200
  force = true

# SPA FALLBACK (LAST)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# CSP HEADERS
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' https://js.stripe.com https://www.googletagmanager.com https://www.google-analytics.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' data: https://fonts.gstatic.com;
      img-src 'self' data: https: blob:;
      connect-src 'self' https://api.securebase.tximhotep.com https://api.stripe.com https://*.stripe.com https://www.google-analytics.com https://analytics.google.com https://www.google.com;
      frame-src 'self' https://js.stripe.com https://hooks.stripe.com https://checkout.stripe.com;
      frame-ancestors 'none';
      base-uri 'self';
      form-action 'self' https://checkout.stripe.com;
    """
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    X-Environment = "demo"
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/checkout"
  [headers.values]
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' https://js.stripe.com https://*.stripe.com https://www.googletagmanager.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' data: https://fonts.gstatic.com;
      img-src 'self' data: https: blob:;
      connect-src 'self' https://api.securebase.tximhotep.com https://api.stripe.com https://*.stripe.com https://www.google-analytics.com https://analytics.google.com https://www.google.com;
      frame-src 'self' https://js.stripe.com https://hooks.stripe.com https://checkout.stripe.com;
      frame-ancestors 'none';
      form-action 'self' https://checkout.stripe.com;
    """
    X-Frame-Options = "DENY"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Environment = "demo"
    X-Robots-Tag = "noindex, nofollow"
