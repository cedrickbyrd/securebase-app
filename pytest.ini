[pytest]
# Root pytest configuration for SecureBase
# Covers: phase2-backend/functions unit tests and tests/ integration/E2E suite

testpaths =
    phase2-backend/functions
    tests/e2e
    tests/integration
    tests/security
    tests/performance

python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# ─── Markers ────────────────────────────────────────────────────────────────
markers =
    integration: Integration tests requiring live AWS/DB services (deselect with -m "not integration")
    e2e: End-to-end tests covering full user workflows
    performance: Load and performance benchmark tests
    security: Security and penetration tests
    slow: Tests that take more than 5 seconds to run
    stripe_sandbox: Tests requiring live Stripe sandbox access (sk_test_… key needed)
    unit: Fast isolated unit tests (no external deps)

# ─── Reporting ──────────────────────────────────────────────────────────────
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:cacheprovider

# ─── Timeout ────────────────────────────────────────────────────────────────
# Requires pytest-timeout; ignored if not installed
# timeout = 60

# ─── asyncio ────────────────────────────────────────────────────────────────
asyncio_mode = auto

# ─── Filter warnings ────────────────────────────────────────────────────────
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
